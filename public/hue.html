        spark_tend: "You start things and you finish them. This sounds straightforward. It isn't. Most people who reach for Spark energy are excellent at starting — the urgency, the push, the willingness to move before everything is ready. The part they often rely on others for is the follow-through. You don't.\n\nTend energy as a second instinct means you have a natural capacity for commitment that most Spark-leading profiles don't. You said you'd do it; you do it. You moved fast at the start; you're still there at the end.\n\nThe tension: your pace early in a project and your pace late in a project can look different. You may accelerate into something with Spark momentum and complete it at Tend pace — which the people around you can read as losing interest, even when you're still fully engaged. Naming this dynamic often helps.",
        spark_flow: "You move fast, and you've usually thought it through. The Spark instinct gets you moving before other people are ready to start. The Flow instinct underneath means you've often already run the logic three steps ahead before you pushed for action. What looks like confidence to the people around you is frequently preparation at speed — the two energies working together faster than either would alone.\n\nThis combination produces something distinctive: you're not just quick, you're often right. And you know it. The tension is that both energies can be very certain of themselves, which means that when you're wrong, it can take longer to recognise and name than the situation warrants. The willingness to be corrected is the thing worth watching.",
        glow_spark: "You care about people and you care about progress. For many people, those two things create a dilemma — when you need to push something forward and someone in the room isn't ready, you have to choose. You feel both pulls more strongly than most, and you're better than most at holding them at the same time.\n\nWhat this looks like: you're the person who can tell someone their idea isn't going to work and still make them feel like they matter. You can move a conversation forward and keep the relational temperature warm while you're doing it.\n\nThe thing to watch: the Spark energy underneath the warmth can surprise people who've only seen the Glow. When you push — really push — it can land harder than you intended, because no one was expecting it from you.",
        glow_tend: "You show up, and you stay. The combination of Glow's attentiveness and Tend's consistency creates something that people in your life often describe with some version of the same phrase: you're always there. Not just when things are good. In the small moments, the difficult ones, the ones that don't come with any obvious reason to show up.\n\nThis profile produces an unusual kind of trust. People don't just like you — they rely on you. They've experienced enough of the smaller commitments that they believe you when the stakes are higher.\n\nThe tension: this capacity to extend yourself can run further than it should. You can carry more than you've been asked to carry because it costs you less than it would cost others, which isn't the same thing as it being free.",
        glow_flow: "You read people and you read situations. Most people do one or the other with any real depth — they're either emotionally attuned or analytically precise. You do both, often simultaneously.\n\nThe Glow instinct means people open up to you. The Flow instinct means you actually assess what they're telling you — the structure of it, what it implies, what the question underneath the question is. In practice, this makes you an unusually effective thinking partner: people feel heard and also helped.\n\nThe tension sits in what to say first. Your Flow instinct wants to name what's actually happening. Your Glow instinct wants to make sure the person feels safe enough to hear it. Getting the sequence right is something you navigate constantly — and getting it wrong in either direction has costs.",
        tend_spark: "You wait for the right moment, and then you move fast. From the outside, this profile can look passive right up until it doesn't. The Tend instinct creates a deliberateness — you observe, you wait, you make sure before you act. The Spark energy underneath means that when you do move, you move with real momentum.\n\nPeople who've worked with you over time have often learned: when you finally push for something, it's worth paying attention. The patience wasn't absence — it was assessment.\n\nThe tension: the gap between when you think it's time to move and when the room decides it's time can create frustration on both sides. Once you've moved, you want the pace to match the decision — which it often doesn't yet.",
        tend_glow: "Steadiness without warmth can feel cold. Warmth without steadiness can feel unreliable. You have both — which is a rarer combination than it sounds, and unusually valuable to the people around you.\n\nYou're consistent in the way that creates genuine safety. People know what to expect from you. They've also experienced being seen by you — noticed in moments they didn't expect, remembered in ways that required no special effort on their part. The combination produces a depth of trust that's difficult to manufacture deliberately.\n\nThe tension: both energies can make it harder to bring forward difficult things. You care about people and you think carefully before acting, which means you sometimes carry knowledge about a situation longer than is useful before you surface it. The care is real. Sometimes the timing is too cautious.",
        tend_flow: "You think carefully, and you think clearly. Tend energy creates the space to actually consider something. Flow energy produces the structure to make sense of what you find in that space. Together, they create the kind of thinking that other people find themselves trusting — not because it's fast, but because when you arrive at a position, it's been properly examined.\n\nThis is the profile that builds things that hold: frameworks that survive contact with reality, plans that have been stress-tested before they're deployed.\n\nThe tension: you can over-examine. Both energies prefer to be right over being quick, and together they create a real reluctance to commit before certainty arrives. In most situations, certainty arrives later than the situation requires. Knowing the difference between not yet ready and never going to be certain is the thing worth developing.",
        flow_spark: "You figure things out and you do something about it. Flow energy without the capacity to act can get stuck in perpetual analysis — the map keeps getting more detailed, the moment to use it keeps getting deferred. Spark energy as a second instinct gives you the capacity to commit, which is the move that most analytical profiles struggle to make.\n\nWhat this produces: you're not just clear about situations — you're useful in them. The thinking doesn't stay in your head. It translates.\n\nThe tension: the two energies have different relationships with uncertainty. Flow wants to map it; Spark wants to push through it. Under pressure, you may oscillate between the two — one moment wanting more information, the next wanting to move regardless. From the outside, this can look like inconsistency. It's usually a genuine internal negotiation between two legitimate instincts.",
        flow_glow: "You understand situations and you understand people. The analytical precision of Flow, paired with Glow's attentiveness, produces something that's genuinely uncommon — a person who can navigate complexity without losing sight of the human dimension of it.\n\nIn practice: you're the one in the room who notices what the data means AND who in the room is struggling with what it means for them.\n\nThe tension: the two energies often want to say different things first. Flow wants to explain the logic. Glow wants to check how people are doing. The sequence matters — lead with the analysis and you can leave people behind; lead with the warmth too long and you can lose the thread of what actually needs to be communicated. You navigate this in real time, most of the time.",
        flow_tend: "You work things out and you stay with them. The combination of Flow's analytical instinct and Tend's follow-through is unusual. You don't just assess a situation — you commit to what that assessment tells you, and you hold that position over time.\n\nThis is the profile of someone who builds things that last. Not because they're right more often than others — because they're more willing to stay with something long enough to make it right.\n\nThe tension: both energies are more comfortable with depth than speed. Moving quickly can feel like moving before you're ready. There's a difference between not yet ready and not ready enough — and it's worth developing a feel for where that line actually is, rather than where it feels like it should be.",
      },
      // Near-equal combinations (61–67)
      nearEqual: {
        spark_flow: "When Spark and Flow come in close together, what you have is momentum and rigour at the same time. The Spark instinct gets things moving. The Flow instinct is already assessing whether they're moving in the right direction.\n\nWhat this produces: a profile that's hard to argue with. You move fast and you've usually thought it through. The tension, when it appears, is internal — one energy says act, the other says wait for one more answer. Under pressure, that negotiation can be visible to the people around you as a brief pause before the move. It usually resolves quickly. When it doesn't, that's worth paying attention to.",
        spark_glow: "When Spark and Glow come in close together, you have urgency and attunement running simultaneously. Most people experience these as a tension — you can move fast, or you can bring people with you, but doing both at once is hard. For you, the combination is closer to fluent. The pace doesn't feel incompatible with the warmth; they often modulate each other.\n\nWhat this produces in practice: you're often the person who can create energy and direction in a room without losing people in the process. The thing to watch: both energies are outward-facing and expressive, which means that in difficult moments — when the situation calls for pausing, reflecting, or taking an unpopular position — neither energy automatically creates that space.",
        glow_tend: "When Glow and Tend come in close together, what you have is attentiveness and follow-through in equal measure. You notice people and you stay — not just in the dramatic moments, but in the ordinary ones that accumulate into something other people eventually describe as extraordinary.\n\nWhat this combination produces is a depth of relationship that requires no particular effort from you, and that takes a significant amount of time for others to build from scratch. It's one of the profiles that people most consistently describe as making them feel genuinely safe — in the way that makes real conversation possible.",
        spark_tend: "Spark and Tend in near-equal balance is one of the more unusual pairings, because the two energies have a different relationship with time. Spark lives in possibility. Tend lives in what's been built over time. The combination produces something that can be disorienting from the inside: you move fast and you take your commitments seriously, which means that when the pace produces something that doesn't hold, you feel it more than others might.\n\nWhat this often looks like in practice: you start things decisively and you don't walk away from them easily. When that combination is working, it produces things that both move and last.",
        tend_flow: "When Tend and Flow come in close together, what you have is patience and precision running side by side. Both energies prefer to be certain before they commit. Both are more comfortable going deep than going broad. The combination produces a quality of judgment that people often trust — not because you're fast, but because by the time you arrive at a position, it's been properly examined and properly held.\n\nThis is the profile that others bring hard problems to. The tension worth knowing: both energies can collude on slowness in a way that neither alone would permit. The combination moves at its best when it has a Spark or Glow energy nearby — someone who makes 'good enough to go' feel possible.",
        glow_flow: "When Glow and Flow come in close together, the attunement to people and the attunement to structure are both running simultaneously. You can hold someone's emotional experience and the logic of their situation at the same time — which is a rarer combination than it looks.\n\nWhat this produces: you're often the person who understands both why someone feels the way they feel and what the situation actually requires — without needing to choose between the two. The work is in the sequencing, not the access: knowing which one the other person needs to encounter first.",
        all_four: "When all four energies come in within close range of each other, the hierarchy is less meaningful than the availability. You reach fluidly. The transitions feel less like stretches and more like steps — the move from action to analysis, from warmth to structure, doesn't require significant effort.\n\nWhat this profile asks is a different question than most. Not 'can I reach this energy?' but 'which energy should I be leading with right now?' Because you have enough of each that the choice isn't automatic — and without deliberate attention, it often settles on what the room expects rather than what the moment requires. The range is real. The skill is in choosing.",
      },
      // Profile shape observations (68–73)
      profileShape: {
        allLow: "Something worth noticing about this profile: it's less common than it might seem. Most people lean toward at least one or two energies with clear preference — a pull toward action, or connection, or steadiness, or analysis that runs in the background without much effort. When all four come out close and low, what that often reflects isn't absence. It's availability.\n\nThe energies haven't settled into a strong hierarchy — or they have, at different times, in different rooms, with different people. That kind of contextual flexibility looks like uncertainty in a snapshot. Over time, it looks like something else. If this profile landed with you as surprising, that's worth sitting with.",
        allHigh: "This profile describes someone who reaches. When the situation calls for something — action, warmth, steadiness, analysis — there's enough of each available to actually show up. High-range profiles are often experienced by the people around them as unusually adaptable: you adjust. What the room needs, you seem to find.\n\nThe thing worth knowing: range is not the same as preference. Even within a high-range profile, there's a sequence — the energy you reach for first when you're not thinking about it, the one that shows up when you're tired, the one that requires just slightly more intention. That sequence is worth knowing, because without it, the choice of what to lead with often defaults to what's socially expected rather than what's genuinely called for.",
        wideGap: "When there's a significant distance between your highest and lowest energy, what that often reflects is depth over range. The energies you reach for most naturally have been used often enough to feel instinctive. The ones you reach for least are genuinely further away — not inaccessible, but requiring intention in a way your dominant energies don't.\n\nThe wide gap is simply a fact about how you naturally contribute — and about where you'll naturally want people around you who reach for what you don't. The specialist profile often produces the clearest individual voice in a team, precisely because there's less ambiguity about what you bring.",
        nearZero: "When one energy comes out significantly lower than the others, it's worth understanding what that distance means. Near-zero doesn't mean unavailable — you're human, and all four energies are human. It means unfamiliar. The situations that call for this energy probably feel less natural, less resourced, or more effortful than the situations that call for your other energies.\n\nThe distance is information, not judgement. Some people with a near-zero energy live a life that rarely demands it, and they thrive. Others find the same pattern showing up in specific places — a particular kind of conversation, a particular kind of decision. Knowing which applies to you matters more than the score itself.",
        powerOfLower: "The energies lower in your profile aren't failing you. They're the ones you reach for with intention rather than instinct — and that changes what they do.\n\nAn instinctive Spark will push. An intentional Spark will push at exactly the right moment. An instinctive Glow will warm a room without thinking about it. An intentional Glow will give their full attention to the person in front of them in a way that doesn't happen when warmth is just the default. An instinctive Tend will hold the line. An intentional Tend will choose which line to hold, and hold it precisely. An instinctive Flow will assess a situation. An intentional Flow will assess the specific thing that matters.\n\nThe energies you're still developing — the ones that take more effort, that don't arrive without being called — often land with a precision that instinctive ones sometimes don't. You chose them. That choice is visible.",
        allHighEqual: "When all four energies come in close together and high, that's a profile that describes real versatility. You can reach across a wide range with something close to fluency — and the transitions between energies probably feel less effortful than they do for people with a more pronounced hierarchy.\n\nThe work for this profile is different from the work for most others. For most people, the task is understanding one or two energies in depth and knowing when to stretch. For you, the task is knowing which energy to lead with in a given moment — because you have enough of each that the choice isn't automatic. That's a genuine skill. And without deliberate attention, the default often settles on what's socially expected rather than what's genuinely called for. The versatility is real. The question is who's making the choice.",
      },
      // Companion-only: under pressure, leadership, conflict, relationships, flex crossings
      underPressure: {
        spark: "Under pressure, the speed that usually makes Spark energy useful can become the thing that creates problems. The instinct to push, decide, move — it accelerates. In practice this often looks like: pushing too hard, too early; making decisions before the information is ready; cutting across people in a way that isolates rather than mobilises.\n\nBut here's what's less obvious: when the pressure is really on and nothing is moving fast enough, the opposite can happen. The energy that's furthest from Spark — the Tend instinct to withdraw, wait, go quiet — can surface in ways that surprise the people around you. The person who's usually pushing for action can suddenly go silent, disengage, or become unexpectedly difficult to reach. It can look like sulking from the outside. From the inside, it often feels like the only available response to a situation that won't move.",
        glow: "Under pressure, Glow energy turns inward — toward the people in the room, often at the expense of the problem. The instinct is to read the temperature, manage the emotional dimension, keep people from fracturing. That's a genuine contribution. It can also become the thing that gets in the way of the difficult conversation the situation actually needs.\n\nBut when the pressure is really intense and the social fabric feels genuinely threatened, the energy furthest from Glow — the Flow instinct — can emerge in unexpected ways. The person who usually holds everything together with warmth can suddenly retreat into process, detail, and analysis. It can look like pedantry. From the inside, it often feels like the only solid ground available when everything else is uncertain.",
        tend: "Under pressure, the deliberateness that Tend energy produces can become a kind of paralysis. The instinct is to wait for more certainty, not move until the decision is sound. When the pressure is external and fast-moving, that pace creates a gap.\n\nBut here's what fewer people see coming: when the pressure is really extreme and the waiting has gone on too long, the energy furthest from Tend — Spark — can break through sharply. The person who is usually patient, measured, and steady can suddenly snap. Not gradually becoming more assertive, but a real shift — a direct, forceful expression of frustration that can catch people off guard precisely because it seems so out of character. Recognising when you're getting close to that edge — before the snap — gives you the chance to name it on your terms instead.",
        flow: "Under pressure, the analytical instinct sharpens — but the target of it can shift. Instead of assessing the actual problem, Flow energy under pressure sometimes starts assessing the meta-problem: what's wrong with the way people are approaching this, what assumptions are being made. The analysis is still running. It's just running on the wrong thing.\n\nBut when the pressure is really extreme, the energy furthest from Flow can surface unexpectedly. The Glow instinct can emerge as something that looks like emotional flooding: catastrophising, making the situation feel bigger and more personal than it probably is, responding to the relational dimension of things in a way that feels disproportionate. It usually passes when the immediate pressure does.",
      },
      leadership: {
        spark: "Spark energy in a leadership position produces momentum. People know where they're going, they know you believe it's possible, and they know you'll push hard to get there. The gap that Spark leadership often creates is in the people who need more time — to think, to ask, to voice concern. They get left behind, or they stop voicing things because the pace signals that the window for input has already closed.\n\nThe most effective version of Spark leadership has something deliberate underneath it — a targeted slowdown at specific moments, not as a natural instinct but as a practice. You already know how to accelerate. The skill that makes the most difference is knowing when to stop and wait.",
        glow: "Glow energy in leadership produces a sense of safety. People feel heard, they feel seen, they feel willing to bring real problems to the surface. This is more valuable than it sounds — most leadership environments are places where people perform being fine rather than saying what's actually happening.\n\nWhat distinguishes Glow leadership is that it doesn't get stuck in the people dimension. The attunement is real — but the forward drive is also real. Glow in leadership often holds the human and the momentum at the same time.\n\nThe gap in Glow leadership often shows up when a hard decision needs to be made that will genuinely disappoint someone. The instinct to keep everyone comfortable, to extend the conversation, to find a version of the decision that works for everyone, can delay the moment that would actually serve people better.",
        tend: "Tend energy in leadership produces steadiness — a quality that becomes most visible in difficult circumstances. People know what to expect from you. When things go wrong, you don't amplify the pressure. You assess, you commit, you follow through. In environments that have experienced a lot of change and chaos, that constancy is meaningful.\n\nThe thing that Tend leadership can underweight is urgency. The same pace that feels measured in normal conditions can feel slow to a team that needs to move. The most effective Tend leaders hold their natural steadiness while naming urgency as a deliberate choice — not because they're panicking, but because the situation requires it.",
        flow: "Flow energy in leadership produces clarity. Complex situations get mapped, assumptions get named, the question nobody was asking gets asked. People who work for Flow leaders often feel genuinely understood — that their leader sees what's actually happening, not a simplified version of it.\n\nThe gap often shows up in the emotional dimension. The precision that makes Flow leadership analytically strong doesn't always carry warmth alongside it — and people need to feel that their leader cares about them, not just about the accuracy of the thinking. Getting the sequence right matters: the understanding has to come before the clarity, or the clarity lands cold.",
      },
      conflict: {
        spark: "Spark energy in conflict names it fast and resolves it fast — or try to. The instinct is directness: if something isn't working, say so, address it, move past it. The risk is that the speed itself creates a second problem on top of the first — the other person hasn't had enough time to feel heard before you're pushing toward resolution, and the push reads as dismissal.\n\nWhat helps: a pause between naming the issue and moving to what happens next. Not a long one. Just long enough for the other person to register that you've actually understood their position, not only identified the problem.",
        glow: "Glow energy finds conflict costly. The instinct is toward resolution — to restore the temperature in the room, repair what's fractured, return to the version of things where people are okay. This means conflict with someone reaching for Glow energy often ends quickly, but sometimes before the actual issue has been fully addressed.\n\nThe accommodation is genuine — and it's worth separating from weakness. But the question worth asking after any conflict resolution is: was the thing that needed to change actually named? Or did the warmth do the work that a harder conversation was supposed to do?",
        tend: "Tend energy in conflict processes internally and surface externally only when something has been fully thought through. By the time someone who reaches for Tend energy raises a conflict, they've usually been sitting with it for some time — and the other person is often surprised by either its existence or its depth.\n\nThe gap this creates: the other person hasn't had time to process what's been accumulating. What feels like a measured conversation from your side can feel like a sudden escalation from theirs. The most useful move is often naming the issue earlier, less completely — before it's been fully resolved internally — even though that feels uncomfortable.",
        flow: "Flow energy in conflict wants to understand the structure of the problem: what actually happened, what was assumed, what the actual disagreement is underneath the surface one. This is useful. It becomes less useful when the other person needs to be heard emotionally before they're ready to be understood analytically.\n\nIn practice: you might accurately diagnose what went wrong while the other person is still in the part where they need to feel that what they felt was real and valid. Getting there too fast — with too much clarity — can land as though you're explaining their experience to them rather than responding to it.",
      },
      relationships: {
        spark: "The people who are close to someone who reaches for Spark energy often feel moved — there's intensity, engagement, a sense of possibility. The thing they sometimes also feel, and don't always say, is that the pace doesn't always leave space for them. That decisions happen before they've had a chance to weigh in. That the relationship moves at your speed, which is often faster than theirs.\n\nThe version of this that works best often involves something that doesn't come naturally: deliberate waiting. Not just physically being present — but slowing down enough that the other person's pace can land as well as yours.",
        glow: "Glow energy in close relationships produces a particular kind of depth. The attention is real — the noticing, the remembering, the attunement to how someone is doing before they've said. People in close relationships with someone who reaches for Glow often describe feeling genuinely known.\n\nThe thing that can be hard to see from the inside: this capacity to attend to others can run so far that your own needs become invisible — to you as much as to them. The people who care about you may not know what you actually need, because you've been so consistently focused on what they need that you've never quite said.",
        tend: "Tend energy in close relationships produces a loyalty that compounds over time. You show up — not just when it's convenient or easy, but consistently, predictably, across the small moments that accumulate into something people call trust. People in long relationships with someone who reaches for Tend energy often can't point to a single dramatic gesture. They point to everything, over a long time.\n\nThe thing that can close this off: difficulty bringing forward what's hard. The same care that creates the loyalty can make it harder to name something that might disrupt it. Sometimes the most caring thing is the thing that creates friction — and Tend energy doesn't always find that easy to reach for.",
        flow: "Flow energy in close relationships produces a kind of understanding that people describe as being genuinely known — not just accepted, but understood. The attention to what's actually happening, the structure of a problem, what someone is really saying — creates a form of insight that is its own kind of care.\n\nWhat sometimes doesn't come naturally alongside it: expressing that care in terms the other person can feel rather than only understand. Analysis is one form of attention. Sometimes the person in front of you needs something that doesn't involve being understood — it involves being held.",
      },
      flexCrossings: {
        spark_glow: "Moving fast is natural. Deliberately slowing to bring someone with you — noticing who's behind, going back, explaining rather than just arriving somewhere and expecting people to catch up — is the reach. When Spark energy reaches for Glow, what changes is that the destination stops being the only thing that matters. The people travelling with you start to count. What this produces in practice: not a slower pace, but a more checking one. A moment to look up, see where everyone is, and adjust.",
        spark_flow: "The instinct is to move. The reach is to pause and ask what you're missing before you do. Flow energy as a deliberate choice for someone who leads with Spark looks like a beat between the impulse and the action — long enough to assess whether the fastest route is also the right route. What helps: picking one specific question to ask before you act, rather than trying to map the whole situation. That's the version of Flow that works with Spark rather than against it.",
        glow_tend: "Warmth comes naturally. Staying with a position when someone is pushing against it, or disappointed, or visibly uncomfortable — that's the reach. Tend energy as a deliberate choice for someone who leads with Glow looks like: deciding in advance that a particular line matters, and then holding it even when the social pressure is running in the other direction. The useful preparation: naming the line before the moment arrives, rather than trying to find it when you're already in the conversation.",
        glow_spark: "Bringing people along is natural. Deciding that the moment for moving is now — even if not everyone is ready — is the reach. Spark energy as a deliberate choice for Glow looks like: naming a direction and committing to it, rather than extending the consultation. At some point the next step isn't more input. It's a decision. What makes this harder: the knowledge that someone will be disappointed. The reach requires separating their discomfort from whether the decision is right.",
        tend_glow: "Waiting until something is fully formed is natural. Bringing it forward while it's still incomplete — still being thought through, still carrying uncertainty — is the reach. Glow energy as a deliberate choice for Tend looks like: sharing before you're certain. Letting the other person see the thinking in progress rather than only the conclusion. This is uncomfortable. It's also what makes conversations feel like conversations rather than presentations.",
        tend_spark: "Waiting for the right moment is natural. Moving before full certainty arrives — making the call, committing to a direction with some unknowns still in place — is the reach. Spark energy as a deliberate choice for Tend looks like: choosing a point at which the decision becomes good enough rather than waiting for it to become obvious. The practice is calibration: what's the actual cost of moving now versus waiting until I'm sure? Often, the cost of waiting is higher than it feels.",
        flow_glow: "Mapping the situation is natural. Responding to the person before responding to the problem is the reach. Glow energy as a deliberate choice for Flow looks like: leading with 'how are you?' and meaning it — before the analysis, before the diagnosis, before the question that cuts to the structural heart of it. The sequence matters more than most people who reach for Flow energy realise. The same insight lands differently depending on what comes before it.",
        flow_spark: "Understanding a situation thoroughly is natural. Committing to a direction while something is still unmapped — before the analysis is complete, before the final question is answered — is the reach. Spark energy as a deliberate choice for Flow looks like: choosing a threshold at which 'enough' is enough, and then acting. The question that helps: if I had one more piece of information, would it actually change what I do? Often, the honest answer is no.",
      },
    };

    // Returns additional observation cards to show on results screen
    function selectAdditionalObs(ranked) {
      const pcts   = ranked.map(e => e.pct);
      const primary = ranked[0].id;
      const second  = ranked[1].id;
      const result = [];

      // 1. Misread — always, first option per dominant energy
      result.push({ type: "misread", text: EXTENDED_OBS.misread[primary][0] });

      // 2. Power of lower energies — always
      result.push({ type: "powerOfLower", text: EXTENDED_OBS.profileShape.powerOfLower });

      // 3. Near-equal pairing — if top two within 10 percentage points
      if (Math.abs(pcts[0] - pcts[1]) <= 10) {
        const key1 = primary + "_" + second;
        const key2 = second + "_" + primary;
        const nearEqText = EXTENDED_OBS.nearEqual[key1] || EXTENDED_OBS.nearEqual[key2] || null;
        if (nearEqText) result.push({ type: "nearEqual", text: nearEqText, label: `${ranked[0].name} and ${ranked[1].name} in close balance` });
      }

      // 4. Profile shape — at most one, in priority order
      const allHighEqual = pcts.every(p => p > 30) && (pcts[0] - pcts[3]) <= 10;
      const allLow       = pcts.every(p => p < 15);
      const allHigh      = pcts.every(p => p > 35);
      const wideGap      = pcts[0] - pcts[3] > 30;
      const nearZero     = pcts[3] < 10;

      if (allHighEqual) {
        result.push({ type: "profileShape", text: EXTENDED_OBS.profileShape.allHighEqual });
      } else if (allLow) {
        result.push({ type: "profileShape", text: EXTENDED_OBS.profileShape.allLow });
      } else if (allHigh) {
        result.push({ type: "profileShape", text: EXTENDED_OBS.profileShape.allHigh });
      } else if (nearZero) {
        result.push({ type: "profileShape", text: EXTENDED_OBS.profileShape.nearZero });
      } else if (wideGap) {
        result.push({ type: "profileShape", text: EXTENDED_OBS.profileShape.wideGap });
      }

      return result;
    }

    // ─── One sentence screen ───────────────────────────────────────────────────
    function OneSentenceScreen({ sentence, primary, onContinue }) {
      const isDesktop = useIsDesktop();
      const textColor = primary.id === "glow" ? C.ink : "#fff";
      const subColor  = primary.id === "glow" ? "rgba(26,20,16,0.45)" : "rgba(255,255,255,0.45)";
      const [copied, setCopied] = useState(false);
      const cardRef = useRef(null);

      const handleShare = async (e) => {
        e.stopPropagation();
        if (!sentence) return;
        const text = `"${sentence}" — myhue.co`;
        if (navigator.share) {
          try { await navigator.share({ text }); } catch (_) {}
        } else {
          await navigator.clipboard.writeText(text).catch(() => {});
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      };

      const handleDownload = async (e) => {
        e.stopPropagation();
        if (!sentence) return;
        await document.fonts.ready;
        const size = 1080;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Background
        ctx.fillStyle = primary.color;
        ctx.fillRect(0, 0, size, size);

        // Word-wrap helper
        const wrapLines = (ctx, text, maxWidth) => {
          const words = text.split(" ");
          const lines = [];
          let line = "";
          for (const word of words) {
            const test = line ? line + " " + word : word;
            if (ctx.measureText(test).width > maxWidth && line) {
              lines.push(line);
              line = word;
            } else {
              line = test;
            }
          }
          if (line) lines.push(line);
          return lines;

        ctx.fillStyle = textColor;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const fontSize = 68;
        ctx.font = `italic 700 ${fontSize}px Fraunces, Georgia, serif`;
        const lines = wrapLines(ctx, `"${sentence}"`, size - 200);
        const lineH = fontSize * 1.3;
        const totalH = lines.length * lineH;
        const startY = size / 2 - totalH / 2 - 40;
        lines.forEach((l, i) => ctx.fillText(l, size / 2, startY + i * lineH + lineH / 2));

        // Footer
        ctx.font = "500 26px 'Plus Jakarta Sans', sans-serif";
        ctx.globalAlpha = 0.4;
        ctx.fillText("myhue.co", size / 2, size - 80);
        ctx.globalAlpha = 1;

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

    function ResultsScreen({ scores, bespokeObs, onContinue, onHome }) {

          ctx.arc(dotsStartX + i * dotSpacing, dotY, dotR, 0, Math.PI * 2);

          ctx.fill();

        // "hue" wordmark

        const needs = t.full !== null;
        return React.createElement(React.Fragment, null,

      // Truncate text at a sentence boundary near maxChars
      function truncateAtSentence(text, maxChars = 200) {
        if (!text || text.length <= maxChars + 20) return { short: text, full: null };
        // Find sentence ends (. ! ?) within the range
        const candidates = [];
        for (let i = 0; i < text.length && i < maxChars + 60; i++) {
          if (".!?".includes(text[i]) && (i + 1 >= text.length || text[i + 1] === " " || text[i + 1] === "\n")) {
            candidates.push(i + 1);

        // Pick a sentence break near maxChars (180–220 range preferred)
        const cut = candidates.filter(c => c >= 40).find(c => c >= maxChars - 20) ||
                    candidates[candidates.length - 1] || maxChars;
        if (cut >= text.length - 20) return { short: text, full: null }; // not worth truncating

    // ─── Suggested questions ──────────────────────────────────────────────────
    function getResultsSuggestions(ranked) {
      if (!ranked || ranked.length < 4) return [
        "How does this work?",
        "What does my profile say about how I work with others?",
        "Where am I most likely to get in my own way?",
        "Which energy should I try to use more deliberately?",
        "What should I pay attention to this week?",
      ];
      const primary   = ranked[0];
      const second    = ranked[1];
      const developing = ranked[3];
      return [
        `Tell me more about my ${primary.name} energy.`,
        `What does it mean that ${developing.name} is my Developing energy?`,
        `How do ${primary.name} and ${second.name} show up together?`,
        "Where am I most likely to get in my own way?",
        "What should I pay attention to this week?",
      ];
    }

    const RETURNING_SUGGESTIONS = [
      "I've got something I'm working through — can we talk?",
      "Where do you think I'm playing it safe?",
      "What's the most useful thing we could focus on right now?",
      "I want to get better at one thing — where do you suggest I start?",
      "What would raising my quieter energy look like in practice?",
    ];

    // Track how many times user has opened the companion chat
    function getChatVisitCount() {
      return parseInt(localStorage.getItem("hue_chat_visits") || "0", 10);
    }
    function incrementChatVisitCount() {
      localStorage.setItem("hue_chat_visits", getChatVisitCount() + 1);
    }

    // Rotate suggestions so different questions appear each visit
    // Visit 1: first 3. Visit 2: last 2 (different set). Visit 3+: none.
    function suggestionsToShow(all, visitCount) {
      if (visitCount >= 3) return [];
      if (visitCount === 2) return all.slice(3);
      return all.slice(0, 3);
    }

    function SuggestedQuestions({ questions, onSelect, isDesktop }) {
      if (!questions.length) return null;
      return (
        <div style={{

          // Mobile: single horizontal scrollable row. Desktop: wrap.
          display: "flex",
          flexWrap: isDesktop ? "wrap" : "nowrap",
          gap: 8,
          overflowX: isDesktop ? "visible" : "auto",
          WebkitOverflowScrolling: "touch",
          scrollbarWidth: "none",
          msOverflowStyle: "none",
        }}>
          {questions.map((q, i) => (
            <button
              key={i}
              onClick={() => onSelect(q)}
              style={{
                background: "#fff",
                border: `1.5px solid ${C.sand}`,
                borderRadius: 99,
                padding: "8px 14px",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 13,
                fontWeight: 500,
                color: C.ink,
                cursor: "pointer",
                lineHeight: 1.3,
                textAlign: "left",
                whiteSpace: isDesktop ? "normal" : "nowrap",
                flexShrink: 0,
                transition: "border-color 0.15s, background 0.15s",
              }}
              onMouseEnter={e => {
                e.currentTarget.style.borderColor = C.ink;
                e.currentTarget.style.background = C.cream;
              }}
              onMouseLeave={e => {
                e.currentTarget.style.borderColor = C.sand;
                e.currentTarget.style.background = "#fff";
              }}

        </div>

    }

    // ─── Companion screen ─────────────────────────────────────────────────────
    function CompanionScreen({ ranked, onHome, returning = false }) {
      const isDesktop = useIsDesktop();
      const [display, setDisplay] = useState([]);
      const [history, setHistory] = useState([]);
      const [input, setInput]     = useState("");
      const [typing, setTyping]   = useState(false);
      const [hasSentMessage, setHasSentMessage] = useState(false);
      const [summaries, setSummaries] = useState(null); // null = loading
      const [anniversary, setAnniversary] = useState(null);
      const lastMessageRef = useRef(null);
      const inputRef  = useRef(null);
      const visitCount = useRef(getChatVisitCount());
      const allSuggestions = returning ? RETURNING_SUGGESTIONS : getResultsSuggestions(ranked);
      const suggestions = suggestionsToShow(allSuggestions, visitCount.current);

      // Rebuild system prompt whenever summaries or anniversary loads
      const system = buildCompanionPrompt(ranked, summaries || [], anniversary);

      useEffect(() => { incrementChatVisitCount(); }, []);

      // Load conversation summaries + anniversary from server on mount
      useEffect(() => {
        fetch("/api/summaries")
          .then(r => r.json())
          .then(d => {
            setSummaries(d.summaries || []);
            setAnniversary(d.anniversary || null);
          })
          .catch(() => setSummaries([]));
      }, []);

      // Fire opener once summaries are resolved
      useEffect(() => {
        if (summaries === null) return; // still loading

        if (returning || summaries.length > 0 || anniversary) {
          // Reflective opener — Claude generates a response informed by memory (and anniversary if present)
          (async () => {
            setTyping(true);
            try {
              const seed = [{ role: "user", content: "Hi Hue, I'm back." }];
              const reply = await callClaude(seed, buildCompanionPrompt(ranked, summaries, anniversary));
              setHistory([
                { role: "user",      content: seed[0].content },
                { role: "assistant", content: reply },
              ]);
              setDisplay([{ from: "hue", text: reply }]);
            } catch {
              setDisplay([{ from: "hue", text: "Something went wrong. Try refreshing the page." }]);
            } finally {
              setTyping(false);
            }
          })();
        } else {
          // First visit, no history — simple hardcoded opener, no API call needed
          const primary = ranked[0];
          setDisplay([{ from: "hue", text: `I've got your colours. What's on your mind?` }]);
        }
      }, [summaries]);

      useEffect(() => {
        lastMessageRef.current?.scrollIntoView({ behavior: "smooth", block: "center" });
      }, [display, typing]);

      useEffect(() => {
        if (!typing && display.length > 0) inputRef.current?.focus();
      }, [typing]);

      const send = async () => {
        const text = input.trim();
        if (!text || typing) return;
        setInput("");
        setHasSentMessage(true);
        const newHistory = [...history, { role: "user", content: text }];
        setHistory(newHistory);
        setDisplay(d => [...d, { from: "user", text }]);
        setTyping(true);
        try {
          const reply = await callClaude(newHistory, system);
          const fullHistory = [...newHistory, { role: "assistant", content: reply }];
          setHistory(fullHistory);
          setDisplay(d => [...d, { from: "hue", text: reply }]);
          // Checkpoint: summarise every 5 user messages
          const userMsgCount = newHistory.filter(m => m.role === "user").length;
          if (userMsgCount % 5 === 0) summariseConversation(fullHistory);
        } catch {
          setDisplay(d => [...d, { from: "hue", text: "Something went wrong. Try again." }]);
        } finally {
          setTyping(false);
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, display: "flex", justifyContent: "center", alignItems: "stretch", background: C.cream, zIndex: 50, padding: isDesktop ? "32px 16px" : 0 }}>
          <div style={{ width: "100%", maxWidth: isDesktop ? 680 : "none", display: "flex", flexDirection: "column", background: C.cream, borderRadius: isDesktop ? 32 : 0, overflow: "hidden", boxShadow: isDesktop ? "0 8px 48px rgba(26,20,16,0.10)" : "none" }}>
            <div style={{
              padding: "18px 20px 14px",
              display: "flex", alignItems: "center", gap: 12,
              borderBottom: `1px solid ${C.sand}`,
              background: C.cream,
              flexShrink: 0,
              borderRadius: isDesktop ? "32px 32px 0 0" : 0,
            }}>
              <SpinMark size={38} paused />
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: C.ink }}>Hue</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {ranked.map(e => (
                    <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <div style={{ width: 6, height: 6, borderRadius: "50%", background: e.color }} />
                      <span style={{ fontSize: 11, fontFamily: "'Plus Jakarta Sans', sans-serif" }}><EnergyWord name={e.name} /></span>
                    </div>
                  ))}
                </div>
              </div>
              <NavIcon type="home" onClick={() => {
                if (history.length >= 2) summariseConversation(history);
                onHome();
              }} />
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px 8px" }}>
              {display.map((m, i) => (
                <Bubble
                  key={i}
                  ref={i === display.length - 1 ? lastMessageRef : null}
                  from={m.from}
                  text={m.text}
                />
              ))}
              {typing && <TypingIndicator />}
              <div style={{ height: "40vh" }} />
            </div>

            {!hasSentMessage && (
              <SuggestedQuestions
                questions={suggestions}
                onSelect={q => {
                  setInput(q);
                  inputRef.current?.focus();
                }}
                isDesktop={isDesktop}
              />
            )}
            <InputBar value={input} onChange={setInput} onSend={send} disabled={typing} placeholder="Ask Hue anything…" inputRef={inputRef} />
          </div>
        </div>
      );
    }

    // ─── Org member registration ──────────────────────────────────────────────
    function OrgRegisterScreen({ onRegistered, onSignIn }) {
      const isDesktop = useIsDesktop();
      const [step,    setStep]    = useState(1);
      const [name,    setName]    = useState("");
      const [email,   setEmail]   = useState("");
      const [orgCode, setOrgCode] = useState("");
      const [loading, setLoading] = useState(false);
      const [error,   setError]   = useState(null);

      // Step 2 — notification routing
      const [notifPref,  setNotifPref]  = useState("personal");
      const [workEmail,  setWorkEmail]  = useState("");

      const [teamIdFromUrl, setTeamIdFromUrl] = useState("");
      const [orgFromUrl, setOrgFromUrl] = useState(false);
      const [invitedEmailFromUrl, setInvitedEmailFromUrl] = useState("");

      // Pre-fill org code and team ID from URL params if present
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("org") || params.get("code");
        if (code) { setOrgCode(code); setOrgFromUrl(true); }
        const team = params.get("team");
        if (team) setTeamIdFromUrl(team);
        const inv = params.get("invited");
        if (inv) setInvitedEmailFromUrl(inv);
      }, []);

      const inputStyle = {
        background: "#fff", border: `1.5px solid ${C.sand}`,
        borderRadius: 12, padding: "14px 18px",
        fontSize: 15, fontFamily: "'Plus Jakarta Sans', sans-serif",
        color: C.ink, outline: "none", width: "100%", boxSizing: "border-box",
      };

      const advanceToStep2 = () => {
        if (!name.trim() || !email.trim()) { setError("Please enter your name and email."); return; }
        if (!orgCode.trim()) { setError("Please enter your organisation code."); return; }
        setError(null);
        setStep(2);
      };

      const submit = async () => {
        if ((notifPref === "work" || notifPref === "both") && !workEmail.trim()) {
          setError("Please enter your work email address."); return;
        }
        setLoading(true); setError(null);
        const teamNotificationEmail = (notifPref === "work" || notifPref === "both") ? workEmail.trim() : null;
        try {
          const res = await fetch("/api/register-org", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: name.trim(), email: email.trim(), orgCode: orgCode.trim(),
              teamId: teamIdFromUrl || undefined, invitedEmail: invitedEmailFromUrl || undefined,
              teamNotificationEmail, teamNotificationPreference: notifPref,
            }),
          });
          const data = await res.json();
          if (!res.ok) { setError(data.error || "Something went wrong. Please try again."); return; }
          window.history.replaceState({}, "", "/");
          onRegistered(data.user);
        } catch { setError("Something went wrong. Please try again."); }
        finally { setLoading(false); }
      };

      const notifOptions = [
        { value: "personal", label: "Personal email", detail: email.trim() || "The address you just entered" },
        { value: "work",     label: "Work email",     detail: "A different address — handy if work is where you'll act on it" },
        { value: "both",     label: "Both",           detail: "Send to both addresses" },
      ];

      if (step === 2) return (
        <div style={{
          minHeight: "100vh", background: C.cream,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          padding: isDesktop ? "64px 32px" : "48px 24px", textAlign: "center",
        }}>
          <SpinMark size={isDesktop ? 72 : 56} speed={8} />
          <h1 style={{
            fontFamily: "'Fraunces', serif",
            fontSize: isDesktop ? 38 : 30, fontWeight: 900,
            color: C.ink, letterSpacing: "-0.03em",
            lineHeight: 1.1, marginTop: isDesktop ? 24 : 18,
          }}>Where should team reminders go?</h1>
          <p style={{
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: isDesktop ? 16 : 14, color: C.stone,
            lineHeight: 1.65, maxWidth: 360,
            marginTop: 12,
          }}>
            When your team has a check-in open, we'll let you know. Pick wherever you're most likely to see it.
          </p>

          <div style={{ marginTop: 28, width: "100%", maxWidth: 380, display: "flex", flexDirection: "column", gap: 10 }}>
            {notifOptions.map(opt => {
              const active = notifPref === opt.value;
              return React.createElement("button", {
                key: opt.value,
                onClick: () => setNotifPref(opt.value),
                style: {
                  background: active ? C.ink : "#fff",
                  border: `1.5px solid ${active ? C.ink : C.sand}`,
                  borderRadius: 14, padding: "14px 18px",
                  textAlign: "left", cursor: "pointer",
                  transition: "background 0.12s, border-color 0.12s",
                  width: "100%",
                },
              },
                React.createElement("div", { style: { fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, fontSize: 15, color: active ? C.cream : C.ink } }, opt.label),
                React.createElement("div", { style: { fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: active ? `${C.cream}99` : C.stone, marginTop: 2 } }, opt.detail)
              );
            })}

            {(notifPref === "work" || notifPref === "both") && (
              <input type="email" placeholder="Work email address" value={workEmail}
                onChange={e => setWorkEmail(e.target.value)}
                onKeyDown={e => e.key === "Enter" && submit()}
                style={{ ...inputStyle, marginTop: 4 }}
                onFocus={e => e.target.style.borderColor = C.ink}
                onBlur={e  => e.target.style.borderColor = C.sand}
              />
            )}

            {error && <p style={{ fontSize: 13, color: C.spark, textAlign: "left", fontFamily: "'Plus Jakarta Sans', sans-serif" }}>{error}</p>}

            <button onClick={submit} disabled={loading} style={{
              background: loading ? C.sand : C.ink,
              color: loading ? C.stone : C.cream,
              border: "none", borderRadius: 99, padding: "16px",
              fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, fontSize: 16,
              cursor: loading ? "default" : "pointer",
              transition: "background 0.15s",
              marginTop: 4,
            }}>
              {loading ? "One moment…" : "Finish setup"}
            </button>

            <button onClick={() => { setStep(1); setError(null); }} style={{
              background: "none", border: "none", color: C.stone,
              fontSize: 13, fontFamily: "'Plus Jakarta Sans', sans-serif",
              marginTop: 4, cursor: "pointer", textDecoration: "underline",
            }}>
              Back
            </button>
          </div>
        </div>
      );

      return (
        <div style={{
          minHeight: "100vh", background: C.cream,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          padding: isDesktop ? "64px 32px" : "48px 24px", textAlign: "center",
        }}>
          <SpinMark size={isDesktop ? 100 : 72} speed={8} />
          <h1 style={{
            fontFamily: "'Fraunces', serif",
            fontSize: isDesktop ? 48 : 36, fontWeight: 900,
            color: C.ink, letterSpacing: "-0.03em",
            lineHeight: 1, marginTop: isDesktop ? 28 : 20,
          }}>Your team uses MyHue.</h1>
          <p style={{
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: isDesktop ? 17 : 15, color: C.stone,
            lineHeight: 1.65, maxWidth: isDesktop ? 400 : 300,
            marginTop: 14,
          }}>
            Discover how you naturally show up — through a real conversation, not a quiz.
          </p>

          <div style={{ marginTop: 36, width: "100%", maxWidth: 380, display: "flex", flexDirection: "column", gap: 12 }}>
            <input type="text" placeholder="First name" value={name}
              onChange={e => setName(e.target.value)} style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}
              onBlur={e  => e.target.style.borderColor = C.sand}
            />
            <input type="email" placeholder="Personal email address" value={email}
              onChange={e => setEmail(e.target.value)} style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}
              onBlur={e  => e.target.style.borderColor = C.sand}
            />
            {!orgFromUrl && <input type="text" placeholder="Organisation code" value={orgCode}
              onChange={e => setOrgCode(e.target.value)}
              onKeyDown={e => e.key === "Enter" && advanceToStep2()}
              style={inputStyle}
              onFocus={e => e.target.style.borderColor = C.ink}
              onBlur={e  => e.target.style.borderColor = C.sand}
            />}
            {error && <p style={{ fontSize: 13, color: C.spark, textAlign: "left", fontFamily: "'Plus Jakarta Sans', sans-serif" }}>{error}</p>}
            <button onClick={advanceToStep2} disabled={!name.trim() || !email.trim() || !orgCode.trim()} style={{
              background: name.trim() && email.trim() && orgCode.trim() ? C.ink : C.sand,
              color: name.trim() && email.trim() && orgCode.trim() ? C.cream : C.stone,
              border: "none", borderRadius: 99, padding: "16px",
              fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, fontSize: 16,
              cursor: name.trim() && email.trim() && orgCode.trim() ? "pointer" : "default",
              transition: "background 0.15s",
            }}>
              Continue
            </button>
          </div>

          {/* Data ownership message — specific to org members */}
          <div style={{
            marginTop: 28, padding: "16px 20px",
            background: C.tendLight, borderRadius: 14,
            border: `1.5px solid ${C.tend}30`,
            maxWidth: 380, width: "100%",
            textAlign: "left",
          }}>
            <p style={{
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              fontSize: 13, lineHeight: 1.6,
              color: C.ink, margin: 0,
            }}>
              Your profile is yours — not your employer's. They see the team picture, never your individual result.
            </p>
          </div>

          <button onClick={onSignIn} style={{
            background: "none", border: "none", color: C.stone,
            fontSize: 13, fontFamily: "'Plus Jakarta Sans', sans-serif",
            marginTop: 16, cursor: "pointer", textDecoration: "underline",
          }}>
            Already have a profile? Sign in
          </button>
        </div>
      );
    }

    // ─── Team Dashboard ──────────────────────────────────────────────────────

    // ─── SharedTeamScreen ─────────────────────────────────────────────────────
    function SharedTeamScreen({ token }) {
      const isDesktop = useIsDesktop();
      const [data, setData]     = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError]   = useState(null);

      useEffect(() => {
        fetch(`/api/shared-team/${token}`)
          .then(r => { if (!r.ok) throw r; return r.json(); })
          .then(d => { setData(d); setLoading(false); })
          .catch(async e => {
            let msg = "This link has expired or is no longer valid.";
            try { const d = await e.json(); if (d.error === "revoked") msg = "This link has been revoked."; } catch {}
            setError(msg); setLoading(false);
          });
      }, [token]);

      if (loading) return React.createElement("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: C.cream } },
        React.createElement("p", { style: { fontFamily: "'Plus Jakarta Sans', sans-serif", color: C.stone } }, "Loading\u2026")
      );
      if (error || !data) return React.createElement("div", { style: { minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: C.cream, padding: 32 } },
        React.createElement("p", { style: { fontFamily: "'Plus Jakarta Sans', sans-serif", color: C.stone, textAlign: "center", maxWidth: 400 } }, error || "Unable to load this team view."),
        React.createElement("a", { href: "/", style: { marginTop: 20, fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: C.stone } }, "Go to MyHue")
      );

      const { team, aggregate, members, notYetRevealedInternally } = data;

      return React.createElement("div", { style: { minHeight: "100vh", background: isDesktop ? "#F7F3ED" : C.cream, display: "flex", flexDirection: "column" } },

            padding: isDesktop ? "20px 40px" : "16px 20px",
          }
        },
          // Left: Hue mark + wordmark

    // ─── Team Constellation (redesigned April 2026) ─────────────────────────
    // Positioning: instinctive energy = quadrant (hard constraint, no exceptions).
    // Fluent energy = position within quadrant. Zone-based placement, not ratio formula.
    // Axis mapping: X = Spark (right) / Tend (left), Y = Flow (top) / Glow (bottom).
    // Quadrants: Spark = top-right, Flow = top-left, Glow = bottom-right, Tend = bottom-left.
    // No animation. No glow/halo. All nodes equal weight. Static only.
    function TeamConstellation({ members, isDesktop }) {
      const canvasSize = isDesktop ? 480 : 320;
      const mx = canvasSize / 2;
      const my = canvasSize / 2;
      const [hovered, setHovered] = useState(null);

      // Band ranking — kept as a fallback for the very edge case where a member
      // has bands but no stored second_energy (legacy records pre-Apr 2026 fix).
      const BAND_RANK = { "Naturally present": 3, "Intentionally present": 2, "Developing": 1 };
      const ENERGY_IDS = ["spark", "glow", "tend", "flow"];

      // Bug 2 (Apr 2026): instinctive comes from stored dominant_energy,
      // fluent comes from stored second_energy (the individual profile's ranked[1]).
      // This matches the individual profile shape rather than team-band thresholds —
      // a member like Nicky with all-Developing bands but a clear individual ranking
      // still gets a meaningful instinctive/fluent pair on the constellation.
      function getRanked(m) {
        const inst = m.instinctiveEnergy || "tend";
        // Prefer stored second_energy from the team_energy_bands record.
        let flu = m.secondEnergy && m.secondEnergy !== inst ? m.secondEnergy : null;
        // Fallback: derive from bands (legacy data with no second_energy stored yet).
        if (!flu && m.bands) {
          flu = ENERGY_IDS
            .filter(e => e !== inst)
            .map(id => ({ id, r: BAND_RANK[m.bands[id]] || 0 }))
            .sort((a, b) => b.r - a.r)[0]?.id || inst;
        }
        if (!flu) flu = inst;
        // Third energy used only for the legacy-fallback flat-profile check below.
        const third = ENERGY_IDS.filter(e => e !== inst && e !== flu)[0] || inst;
        return [{ id: inst }, { id: flu }, { id: third }];
      }

      // Responsive node radius
      const totalMembers = members.filter(m => m.assessmentComplete && m.bands).length;
      const nodeR = totalMembers > 30 ? 10 : totalMembers > 20 ? 12 : 14;
      const R = nodeR + 2; // padding from edge

      // Zone-based position: quadrant from instinctive, position from fluent pull
      function getBasePosition(ranked) {
        const inst = ranked[0].id;
        const flu = ranked[1].id;
        const zones = {
          spark: { xMin: mx + R, xMax: canvasSize - R, yMin: R, yMax: my - R },
          glow:  { xMin: mx + R, xMax: canvasSize - R, yMin: my + R, yMax: canvasSize - R },
          flow:  { xMin: R, xMax: mx - R, yMin: R, yMax: my - R },
          tend:  { xMin: R, xMax: mx - R, yMin: my + R, yMax: canvasSize - R },
        };
        const z = zones[inst];
        const near = 0.25;
        const centre = 0.5;
        const pullTable = {
          "glow-spark":  { x: centre, y: near },
          "glow-tend":   { x: near, y: centre },
          "glow-flow":   { x: near, y: near },
          "glow-glow":   { x: centre, y: centre },
          "tend-glow":   { x: 1 - near, y: centre },
          "tend-flow":   { x: centre, y: near },
          "tend-spark":  { x: centre, y: centre },
          "tend-tend":   { x: centre, y: centre },
          "spark-glow":  { x: centre, y: 1 - near },
          "spark-flow":  { x: near, y: centre },
          "spark-tend":  { x: centre, y: centre },
          "spark-spark": { x: centre, y: centre },
          "flow-tend":   { x: centre, y: 1 - near },
          "flow-spark":  { x: 1 - near, y: centre },
          "flow-glow":   { x: centre, y: centre },
          "flow-flow":   { x: centre, y: centre },
        };
        const key = inst + "-" + flu;
        const pull = pullTable[key] || { x: centre, y: centre };
        return {
          x: z.xMin + pull.x * (z.xMax - z.xMin),
          y: z.yMin + pull.y * (z.yMax - z.yMin),
        };
      }

      // Clamp node inside its instinctive energy quadrant
      function clampToQuadrant(member) {
        const inst = member.ranked[0].id;
        const bounds = {
          spark: { xMin: mx + R, xMax: canvasSize - R, yMin: R, yMax: my - R },
          glow:  { xMin: mx + R, xMax: canvasSize - R, yMin: my + R, yMax: canvasSize - R },
          flow:  { xMin: R, xMax: mx - R, yMin: R, yMax: my - R },
          tend:  { xMin: R, xMax: mx - R, yMin: my + R, yMax: canvasSize - R },
        }[inst];
        member.x = Math.max(bounds.xMin, Math.min(bounds.xMax, member.x));
        member.y = Math.max(bounds.yMin, Math.min(bounds.yMax, member.y));
      }

      // Bug 1 (Apr 2026): jitter nodes that share an identical base position before
      // nudging. Several members can land on the exact same x/y when they share an
      // instinctive+fluent combination (e.g. Tend-Glow), and the nudge below does
      // nothing when dist === 0. Without jitter the row never breaks apart and they
      // form a horizontal line. Jitter is deterministic (member index) so renders
      // are stable across re-renders, and small (~3px) so it doesn't disturb the
      // intended position within the quadrant.
      function jitterCollocated(nodes) {
        const seen = new Map();
        nodes.forEach((n, i) => {
          const key = `${Math.round(n.x)}|${Math.round(n.y)}`;
          const count = seen.get(key) || 0;
          if (count > 0) {
            // Push subsequent collocated nodes around a small circle in the true plane
            const angle = (count * 2.3994); // golden-angle-ish spread, deterministic
            n.x += Math.cos(angle) * 3;
            n.y += Math.sin(angle) * 3;
          }
          seen.set(key, count + 1);
        });
      }

      // Overlap nudging: iterative collision resolution with quadrant clamping.
      // The nudge pushes along the true vector between centres (dx/dist, dy/dist),
      // not along a single axis — combined with jitterCollocated above this prevents
      // the horizontal-row clustering reported in the live build.
      function resolveOverlaps(nodes, minDist = 40, maxPasses = 50) {
        for (let pass = 0; pass < maxPasses; pass++) {
          let moved = false;
          for (let i = 0; i < nodes.length; i++) {
