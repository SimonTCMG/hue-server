<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hue</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #FDFAF4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    #root {
      min-height: 100%;
      width: 100%;
      position: relative;
    }
    @media (min-width: 768px) {
      body { background: #F5F0E8; }
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      from { width: 0%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Design tokens ────────────────────────────────────────────────────────
    const C = {
      cream: "#FDFAF4", ink: "#1A1410", sand: "#E8DFC8", stone: "#9B8E7E",
      spark: "#D92010", sparkLight: "#FFF0ED",
      glow:  "#F5D000", glowLight:  "#FEFCE8",
      root:  "#1A8C4E", rootLight:  "#E8F7EF",
      flow:  "#1755B8", flowLight:  "#E8F0FC",
    };

    const ENERGIES = [
      { id: "spark", name: "Spark", color: C.spark, light: C.sparkLight, desc: "Drive · Action · Ignition" },
      { id: "glow",  name: "Glow",  color: C.glow,  light: C.glowLight,  desc: "Warmth · Optimism · Connection" },
      { id: "root",  name: "Root",  color: C.root,  light: C.rootLight,  desc: "Steadiness · Care · Depth" },
      { id: "flow",  name: "Flow",  color: C.flow,  light: C.flowLight,  desc: "Clarity · Systems · Vision" },
    ];

    // ─── Responsive hook ──────────────────────────────────────────────────────
    function useIsDesktop() {
      const [isDesktop, setIsDesktop] = useState(() => window.innerWidth >= 768);
      useEffect(() => {
        const fn = () => setIsDesktop(window.innerWidth >= 768);
        window.addEventListener("resize", fn);
        return () => window.removeEventListener("resize", fn);
      }, []);
      return isDesktop;
    }

    // ─── localStorage ─────────────────────────────────────────────────────────
    const STORAGE_KEY = "hue_profile_v1";
    const RETAKE_LOCKOUT_DAYS = 90;

    function saveProfile(scores, ranked) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          date: new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }),
          savedAt: Date.now(),
          scores,
          rankedIds: ranked.map(e => e.id),
        }));
      } catch {}
    }

    function loadProfile() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function profileToRanked(saved) {
      const total = Object.values(saved.scores).reduce((a, b) => a + b, 0);
      return saved.rankedIds.map(id => {
        const e = ENERGIES.find(e => e.id === id);
        return { ...e, score: saved.scores[id], pct: Math.round((saved.scores[id] / total) * 100) };
      });
    }

    function retakeAvailableDate(saved) {
      if (!saved) return null;
      // Fall back to now if savedAt missing (profile pre-dates this field)
      const savedAt = saved.savedAt || Date.now();
      const unlockMs = savedAt + RETAKE_LOCKOUT_DAYS * 24 * 60 * 60 * 1000;
      return unlockMs > Date.now() ? new Date(unlockMs) : null;
    }

    // ─── Prompts ──────────────────────────────────────────────────────────────
    const ASSESSMENT_PROMPT = `You are Hue — a warm, curious, and genuinely insightful companion helping people discover their colour energy profile through natural conversation. Warm, occasionally witty, never corporate.

Hue's model is grounded in Jungian analytical psychology — specifically Jung's insight that psychological type describes a habitual attitude (a tendency and preference, not a fixed capability), and that all four functions are present in every person, varying only in reach order. Hue's four energies are a contemporary expression of this framework. Every question you ask should surface behavioural tendency, not elicit a preferred self-image. Ask about what people actually did in specific recent situations — never hypothetical preferences.

Four colour energies (preferences/tendencies, NOT capabilities):
- Spark (red): reaches for action, momentum, going first, directness
- Glow (yellow): reaches for people, connection, ideas, enthusiasm
- Root (green): reaches for steadiness, inclusion, relationships, listening
- Flow (blue): reaches for clarity, rigour, the right path, understanding before acting

Ask 8-10 varied questions covering: what energises them, how they handle conflict, what a great day looks like, how they make decisions, what people thank them for, how they spend free time, how they approach new challenges. Keep it flowing conversation, not an interview. One question at a time. No emojis. No markdown formatting — plain prose only.

After 8-10 exchanges, output EXACTLY this JSON on its own line:
{"done":true,"scores":{"spark":N,"glow":N,"root":N,"flow":N}}
Where N are integers summing to ~28, genuinely reflecting the conversation.`;

    function buildCompanionPrompt(ranked, summaries = [], anniversary = null) {
      const memoryBlock = summaries.length > 0
        ? `\n\nWhat you remember from previous conversations with this person:\n${summaries.map(s => `- ${s.summary}`).join("\n")}\n\nUse this memory naturally — reference it when relevant, not as a preamble. If opening a new session, draw on one specific thing from memory to make your opening feel like a continuation, not a restart.`
        : "";
      const anniversaryBlock = anniversary
        ? `\n\nANNIVERSARY: Today marks approximately one year since this person completed their first energy exploration with you. When you open, acknowledge this warmly and share the sentence you wrote for them then: "${anniversary.sentence}" — then ask simply whether it still sounds like them. Make this your opening. Do not wait for them to bring it up.`
        : "";
      return `You are Hue — a warm, honest, and genuinely useful personal companion. You are not a report reader or a chatbot. You are a thinking partner who happens to know this person's colour energy profile well. Your warmth is constant and non-negotiable — it doesn't change based on who you're talking to. You can be more concise and direct with someone who has strong Spark energy, but you never become clinical or cold. You are always on their side, even when you're challenging them. Think: a brilliant friend who tells you the truth, but does it because they care.

You conducted this assessment yourself through natural conversation — you asked the questions and listened carefully to how this person responded. The profile below reflects patterns you genuinely noticed. When asked how you reached these conclusions, speak to what you observed in the conversation: recurring themes, the way they framed things, what they lit up about. Don't refer to an algorithm or external calculation — you did this, and you can speak to it.

This person's colour energy profile (ranked):
${ranked.map((e, i) => `${i + 1}. ${e.name} (${e.pct}%) — ${["Instinctive", "Fluent", "Intentional", "Developing"][i]}`).join("\n")}

All four energies are equally valuable and fully accessible — this is reach order only. Never say any colour "can't" do something. Frame everything as tendency and preference. You can say "try raising your [colour] energy here" — all four are tools available to this person.

COACHING REGISTER — you are not just an answer machine. Sometimes the most useful thing you can do is ask one question that helps this person think more clearly for themselves. Use your judgment: don't always explain, sometimes just ask.

COLOUR ENERGY IN COACHING — this is what makes your coaching distinctly Hue. When someone describes friction, misunderstanding, or tension with another person, read it through the lens of the energies. CRITICAL LANGUAGE RULE: never describe anyone — the user or anyone else — as a type or a label. Nobody is "a Spark person" or "a Flow person." People reach for different energies in different moments. Always frame it as what energy someone appears to be reaching for right now, in this situation. "It sounds like you're reaching for Spark energy here — urgency, momentum, let's move." "Your colleague seems to be drawing on their Flow energy in this — they need rigour and confidence before they can commit." This framing is non-negotiable. It keeps the energies as tools, not identities, and it's what makes Hue fundamentally different from every other profiling tool.

When you spot an energy dynamic, do three things: name what energy each person appears to be reaching for, explain what that feels like from each side (without labelling either as right or wrong), then suggest a specific flex — what energy could the user consciously raise to bridge the gap? Example: "It sounds like you're reaching for Spark energy — urgency, momentum, let's move — and they're drawing on Flow, needing rigour and confidence before they can commit. From where they are, your pace might feel like corners being cut. From where you are, their process feels like unnecessary delay. Both are understandable. What might help is raising a little Flow energy yourself — offer them one or two details upfront that you know they'll want. It signals care, and it makes it easier for them to move with you." Return to the energies throughout the coaching conversation, not just once at the start.

Ask rather than answer when:
- Someone brings a situation, problem, or dilemma they're working through
- They seem to already know what they think but haven't articulated it yet
- They're seeking reassurance more than information
- Sitting with a question would serve them better than a quick answer

Question types to draw from:
- Clarifying: "What would that actually look like for you?" or "When you say [X], what do you mean?"
- Challenging: "What's the story you're telling yourself about that?" or "What are you assuming here that might not be true?"
- Reframing through colour: "What would it look like to bring more [colour] energy to this?" or "Is your [colour] energy helping or getting in the way right now?"
- Future-focused: "If this resolved well, what would be different?" or "What would the version of you who handled this really well do next?"

Never ask more than one question at a time. Make it count. A single well-placed question is worth more than three paragraphs of advice.

When someone is clearly asking for information or profile explanation, answer directly — don't deflect with a question when a straight answer is what's needed.

PRE/POST SITUATION PRACTICE — when someone mentions an upcoming situation (a difficult conversation, an important meeting, a decision they're facing), shift into preparation mode: ask what energy the situation actually calls for, and what they'll intentionally bring. Keep it to one or two questions. When someone reflects back on a situation that has passed, ask how it went and whether they drew on what they intended. This is applied learning — connect their profile to real moments, not abstract self-knowledge.

When a returning user greets you (e.g. "Hi Hue, I'm back"), welcome them warmly and briefly — mention one or two specific things you could explore together that connect to their particular profile. Make it feel like picking up a conversation, not starting a new one. 2-3 sentences maximum.

IF ASKED "how does this work?" or about the origins of the model, answer in your own words along these lines: People have always known that human nature comes in roughly four flavours — Aristotle saw it in the elements, Hippocrates mapped it to temperament, Jung built a psychology around it, and dozens of frameworks since have rediscovered the same pattern. What most got wrong was treating the four as fixed types — things you were, rather than energies you have. Hue starts from a different place: you don't have a colour, you have colours. All four are real in you. What differs is reach order — which comes naturally first, which takes more intention. The conversation we had wasn't a quiz. I was listening for recurring themes: what you lit up about, how you framed decisions, where you hesitated. That's how the profile came together. And this is just the beginning — the more we talk, the more useful it becomes.

No markdown formatting — plain prose only. No asterisks, no bullet points, no headers. Keep responses concise: 2-4 short paragraphs when explaining, one question when coaching.${memoryBlock}${anniversaryBlock}`;
    }

    // ─── API ──────────────────────────────────────────────────────────────────
    async function callClaude(messages, system) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, messages }),
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || "API error");
      return d.text;
    }

    // Fire-and-forget — saves a conversation summary in the background
    function summariseConversation(messages) {
      fetch("/api/summarise", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      }).catch(() => {}); // silent fail — non-blocking
    }

    function parseScores(text) {
      const m = text.match(/\{"done":true,"scores":\{"spark":(\d+),"glow":(\d+),"root":(\d+),"flow":(\d+)\}\}/);
      if (!m) return null;
      return { spark: +m[1], glow: +m[2], root: +m[3], flow: +m[4] };
    }

    // ─── SpinMark — the Hue logo mark ─────────────────────────────────────────
    // Dots orbit the H continuously. No colour is ever fixed at the top.
    // variant: "light" (white bg), "dark" (ink bg), "float" (no bg)
    // speed: seconds per full revolution (default 8 — ambient, noticeable but calm)
    function SpinMark({
      size = 48,
      speed = 8,
      direction = 1,
      dotScale = 1,
      spread = 0.30,
      showH = true,
      paused = false,
      variant = "light",
    }) {
      const cx = size / 2, cy = size / 2;
      const r    = size * spread;
      const dotR = size * 0.158 * dotScale;
      const angleRef = useRef(45);
      const rafRef   = useRef(null);
      const lastRef  = useRef(null);
      const svgRef   = useRef(null);

      useEffect(() => {
        const tick = (ts) => {
          if (!lastRef.current) lastRef.current = ts;
          const dt = ts - lastRef.current;
          lastRef.current = ts;
          if (!paused) angleRef.current += (dt / 1000) * (360 / speed) * direction;
          if (svgRef.current) {
            const g = svgRef.current.querySelector(".spin-group");
            if (g) g.setAttribute("transform", `rotate(${angleRef.current} ${cx} ${cy})`);
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [speed, direction, paused, cx, cy]);

      // Clockwise from TL: Spark 315°, Glow 45°, Root 135°, Flow 225°
      const dotAngles = [315, 45, 135, 225];

      const bgFill = variant === "dark" ? C.ink : "#FFFFFF";
      const hFill  = variant === "dark" ? C.cream : C.ink;

      const hW = size * 0.30, hH = size * 0.28;
      const sw = size * 0.055, cbH = size * 0.055;
      const hx = cx - hW / 2, hy = cy - hH / 2;

      return (
        <svg ref={svgRef} width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none"
          style={{ display: "block", flexShrink: 0 }}>
          {variant !== "float" && <circle cx={cx} cy={cy} r={size * 0.48} fill={bgFill} />}
          <g className="spin-group">
            {ENERGIES.map((e, i) => {
              const a = dotAngles[i] * Math.PI / 180;
              return <circle key={e.id} cx={cx + r * Math.cos(a)} cy={cy + r * Math.sin(a)} r={dotR} fill={e.color} />;
            })}
          </g>
          {showH && (
            <g fill={hFill}>
              <rect x={hx}           y={hy}                  width={sw}  height={hH}  rx={sw * 0.3} />
              <rect x={hx + hW - sw} y={hy}                  width={sw}  height={hH}  rx={sw * 0.3} />
              <rect x={hx}           y={cy - cbH / 2}        width={hW}  height={cbH} rx={cbH * 0.3} />
            </g>
          )}
        </svg>
      );
    }

    // ─── Chat bubble ──────────────────────────────────────────────────────────
    function renderText(text) {
      // Handle **bold**, *bold*, and plain text
      const parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
      return parts.map((part, i) => {
        if (part.startsWith("**") && part.endsWith("**")) {
          return <strong key={i}>{part.slice(2, -2)}</strong>;
        }
        if (part.startsWith("*") && part.endsWith("*")) {
          return <strong key={i}>{part.slice(1, -1)}</strong>;
        }
        return part;
      });
    }

    function Bubble({ from, text }) {
      const isHue = from === "hue";
      return (
        <div style={{
          display: "flex",
          justifyContent: isHue ? "flex-start" : "flex-end",
          marginBottom: 10,
          animation: "fadeUp 0.25s ease both",
        }}>
          <div style={{
            maxWidth: "84%",
            background: isHue ? "#fff" : C.ink,
            color: isHue ? C.ink : C.cream,
            borderRadius: isHue ? "4px 20px 20px 20px" : "20px 4px 20px 20px",
            padding: "12px 16px",
            fontSize: 15,
            lineHeight: 1.65,
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            border: isHue ? `1px solid ${C.sand}` : "none",
            boxShadow: isHue ? "0 1px 6px rgba(0,0,0,0.05)" : "none",
            whiteSpace: "pre-wrap",
          }}>
            {renderText(text)}
          </div>
        </div>
      );
    }

    function TypingIndicator() {
      return (
        <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 10 }}>
          <div style={{
            background: "#fff",
            border: `1px solid ${C.sand}`,
            borderRadius: "4px 20px 20px 20px",
            padding: "13px 16px",
            display: "flex", gap: 5, alignItems: "center",
            boxShadow: "0 1px 6px rgba(0,0,0,0.05)",
          }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                width: 7, height: 7, borderRadius: "50%", background: C.stone,
                animation: `bounce 1.3s ease-in-out ${i * 0.18}s infinite`,
              }} />
            ))}
          </div>
        </div>
      );
    }

    // ─── Shared input bar ─────────────────────────────────────────────────────
    function InputBar({ value, onChange, onSend, disabled, placeholder, inputRef }) {
      return (
        <div style={{
          padding: "12px 16px calc(12px + env(safe-area-inset-bottom, 8px))",
          background: C.cream,
          borderTop: `1px solid ${C.sand}`,
          display: "flex", gap: 10, alignItems: "center",
        }}>
          <input
            ref={inputRef}
            value={value}
            onChange={e => onChange(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !e.shiftKey && onSend()}
            placeholder={placeholder || "Type your response…"}
            disabled={disabled}
            style={{
              flex: 1,
              background: "#fff",
              border: `1.5px solid ${C.sand}`,
              borderRadius: 99,
              padding: "12px 18px",
              fontSize: 15,
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              color: C.ink,
              outline: "none",
              opacity: disabled ? 0.5 : 1,
            }}
          />
          <button
            onClick={onSend}
            disabled={!value.trim() || disabled}
            style={{
              width: 44, height: 44, flexShrink: 0,
              background: value.trim() && !disabled ? C.ink : C.sand,
              border: "none", borderRadius: "50%",
              cursor: value.trim() && !disabled ? "pointer" : "default",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "background 0.15s",
            }}
          >
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 15V3M3 9l6-6 6 6"
                stroke={value.trim() && !disabled ? C.cream : C.stone}
                strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </button>
        </div>
      );
    }

    // ─── Welcome screen ───────────────────────────────────────────────────────
    function WelcomeScreen({ onStart, onChat, savedProfile, onSignIn }) {
      const isDesktop = useIsDesktop();
      const primaryEnergy = savedProfile
        ? ENERGIES.find(e => e.id === savedProfile.rankedIds[0])
        : null;
      const lockedUntil = retakeAvailableDate(savedProfile);
      const hasProfile = !!savedProfile;

      const retakeLabel = lockedUntil
        ? `Retake available ${lockedUntil.toLocaleDateString("en-GB", { day: "numeric", month: "long" })}`
        : "Retake the assessment";

      return (
        <div style={{
          minHeight: "100vh",
          background: isDesktop ? "transparent" : C.cream,
          display: "flex",
          flexDirection: "column",
          alignItems: "center",
          justifyContent: "center",
          padding: isDesktop ? "64px 32px" : "48px 32px",
          textAlign: "center",
        }}>
          <SpinMark size={isDesktop ? 140 : 100} speed={8} />
          <h1 style={{
            fontFamily: "'Fraunces', serif",
            fontSize: isDesktop ? 72 : 48, fontWeight: 900,
            color: C.ink, letterSpacing: "-0.03em",
            lineHeight: 1, marginTop: isDesktop ? 32 : 24,
          }}>Hue</h1>
          <p style={{
            fontFamily: "'Fraunces', serif",
            fontSize: isDesktop ? 22 : 18,
            fontWeight: 500,
            fontStyle: "italic",
            color: C.stone,
            letterSpacing: "-0.01em",
            lineHeight: 1.3,
            marginTop: 16,
            maxWidth: isDesktop ? 400 : 280,
          }}>Four energies. Infinite versions of you.</p>
          <p style={{
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: isDesktop ? 16 : 14, color: C.stone,
            lineHeight: 1.65, maxWidth: isDesktop ? 320 : 260,
            marginTop: 10,
            opacity: 0.7,
          }}>
            {hasProfile
              ? `Your colour energy profile · ${savedProfile.date}`
              : "A short conversation maps your four colour energies. Then Hue stays with you."}
          </p>

          {hasProfile && (
            <div style={{ display: "flex", gap: isDesktop ? 16 : 8, marginTop: 12, alignItems: "center" }}>
              {savedProfile.rankedIds.map((id, i) => {
                const e = ENERGIES.find(e => e.id === id);
                return (
                  <div key={id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                    <div style={{ width: isDesktop ? 12 : 10, height: isDesktop ? 12 : 10, borderRadius: "50%", background: e.color }} />
                    {isDesktop && <span style={{ fontSize: 10, color: C.stone, fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 600 }}>{e.name}</span>}
                  </div>
                );
              })}
            </div>
          )}

          {!hasProfile && (
            <div style={{ display: "flex", gap: isDesktop ? 20 : 10, marginTop: 12, alignItems: "center" }}>
              {ENERGIES.map(e => (
                <div key={e.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                  <div style={{ width: isDesktop ? 12 : 10, height: isDesktop ? 12 : 10, borderRadius: "50%", background: e.color }} />
                  {isDesktop && <span style={{ fontSize: 10, color: C.stone, fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 600 }}>{e.name}</span>}
                </div>
              ))}
            </div>
          )}

          {/* Primary CTA */}
          {hasProfile ? (
            <button
              onClick={() => onChat()}
              style={{
                marginTop: 36,
                background: C.ink, color: C.cream,
                border: "none", borderRadius: 99,
                padding: "16px 40px",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontWeight: 700, fontSize: 16,
                cursor: "pointer", letterSpacing: "-0.01em",
              }}
            >
              Chat with Hue
            </button>
          ) : (
            <button
              onClick={onStart}
              style={{
                marginTop: 36,
                background: C.ink, color: C.cream,
                border: "none", borderRadius: 99,
                padding: "16px 40px",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontWeight: 700, fontSize: 16,
                cursor: "pointer", letterSpacing: "-0.01em",
              }}
            >
              Begin the conversation
            </button>
          )}

          {/* Secondary: retake (locked or available) */}
          {hasProfile && (
            <button
              onClick={lockedUntil ? undefined : onStart}
              disabled={!!lockedUntil}
              style={{
                marginTop: 12,
                background: "transparent",
                color: lockedUntil ? C.stone : C.ink,
                border: `1.5px solid ${C.sand}`,
                borderRadius: 99,
                padding: "13px 28px",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontWeight: 600, fontSize: 14,
                cursor: lockedUntil ? "default" : "pointer",
                opacity: lockedUntil ? 0.5 : 1,
              }}
            >
              {retakeLabel}
            </button>
          )}

          {/* View results link */}
          {hasProfile && (
            <button
              onClick={() => onChat(true)}
              style={{
                marginTop: 10,
                background: "none", border: "none",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 13, color: C.stone,
                cursor: "pointer", textDecoration: "underline",
                textUnderlineOffset: 3,
              }}
            >
              View my results
            </button>
          )}

          {!hasProfile && (
            <>
              <p style={{

    // ─── Chat screen (assessment) ─────────────────────────────────────────────
    function ChatScreen({ onComplete, onHome }) {
      const isDesktop = useIsDesktop();
      const [display, setDisplay]   = useState([]);
      const [history, setHistory]   = useState([]);
      const [input, setInput]       = useState("");
      const [typing, setTyping]     = useState(false);
      const [error, setError]       = useState(null);
      const bottomRef = useRef(null);
      const inputRef  = useRef(null);

      useEffect(() => {
        if (!typing && display.length > 0) inputRef.current?.focus();
      }, [typing]);

      useEffect(() => {
        (async () => {
          setTyping(true);
          try {
            const seed = [{ role: "user", content: "Hi, I'm ready to start my colour energy assessment." }];
            const reply = await callClaude(seed, ASSESSMENT_PROMPT);
            setHistory([
              { role: "user",      content: seed[0].content },
              { role: "assistant", content: reply },
            ]);
            setDisplay([{ from: "hue", text: reply }]);
          } catch {
            setError("Couldn't reach the server. Make sure it's running on localhost:3001.");
          } finally {
            setTyping(false);
          }
        })();
      }, []);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [display, typing]);

      const send = async () => {
        const text = input.trim();
        if (!text || typing) return;
        setInput("");
        setError(null);

        const newHistory = [...history, { role: "user", content: text }];
        setHistory(newHistory);
        setDisplay(d => [...d, { from: "user", text }]);
        setTyping(true);

        try {
          const reply = await callClaude(newHistory, ASSESSMENT_PROMPT);
          const scores = parseScores(reply);

          if (scores) {
            const displayText = reply.replace(/\{"done":true.*?\}/, "").trim();
            if (displayText) setDisplay(d => [...d, { from: "hue", text: displayText }]);
            const fullHistory = [...newHistory, { role: "assistant", content: reply }];
            setTimeout(() => onComplete(scores, fullHistory), displayText ? 1400 : 400);
          } else {
            setHistory(h => [...h, { role: "assistant", content: reply }]);
            setDisplay(d => [...d, { from: "hue", text: reply }]);
          }
        } catch {
          setError("Something went wrong — please try again.");
          setDisplay(d => d.slice(0, -1));
          setHistory(newHistory.slice(0, -1));
          setInput(text);
        } finally {
          setTyping(false);
        }
      };

      return (
        <ChatFrame isDesktop={isDesktop}>
          <div style={{ background: isDesktop ? "transparent" : C.cream, display: "flex", flexDirection: "column", flex: 1 }}>
            <div style={{

              <BackButton onBack={onHome} />
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 10 }}>
                <SpinMark size={38} speed={8} />
                <div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: C.ink }}>Hue</div>
                  <div style={{ fontSize: 11, color: C.stone, fontFamily: "'Plus Jakarta Sans', sans-serif", letterSpacing: "0.04em", textTransform: "uppercase" }}>Colour Energy Assessment</div>
                </div>
              </div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px 8px" }}>
              {display.length === 0 && !error && (
                <p style={{ textAlign: "center", color: C.stone, fontSize: 13, marginTop: 48, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                  Starting your conversation…
                </p>

                  borderRadius: 12, padding: "12px 16px", marginTop: 8,

            </div>

      );

    function OneSentenceScreen({ sentence, primary, onContinue }) {
      const isDesktop = useIsDesktop();
      const textColor = primary.id === "glow" ? C.ink : "#fff";
      const subColor  = primary.id === "glow" ? "rgba(26,20,16,0.45)" : "rgba(255,255,255,0.45)";
      const [copied, setCopied] = useState(false);
      const cardRef = useRef(null);

      const handleShare = async (e) => {
        e.stopPropagation();
        if (!sentence) return;
        const text = `"${sentence}" — myhue.co`;
        if (navigator.share) {
          try { await navigator.share({ text }); } catch (_) {}
        } else {
          await navigator.clipboard.writeText(text).catch(() => {});
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }
      };

      const handleDownload = async (e) => {
        e.stopPropagation();
        if (!sentence) return;
        await document.fonts.ready;
        const size = 1080;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Background
        ctx.fillStyle = primary.color;
        ctx.fillRect(0, 0, size, size);

        // Word-wrap helper
        const wrapLines = (ctx, text, maxWidth) => {
          const words = text.split(" ");
          const lines = [];
          let line = "";
          for (const word of words) {
            const test = line ? line + " " + word : word;
            if (ctx.measureText(test).width > maxWidth && line) {
              lines.push(line);
              line = word;
            } else {
              line = test;
            }
          }
          if (line) lines.push(line);
          return lines;
        };

        // Sentence
        ctx.fillStyle = textColor;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const fontSize = 68;
        ctx.font = `italic 700 ${fontSize}px Fraunces, Georgia, serif`;
        const lines = wrapLines(ctx, `"${sentence}"`, size - 200);
        const lineH = fontSize * 1.3;
        const totalH = lines.length * lineH;
        const startY = size / 2 - totalH / 2 - 40;
        lines.forEach((l, i) => ctx.fillText(l, size / 2, startY + i * lineH + lineH / 2));

        // Footer
        ctx.font = "500 26px 'Plus Jakarta Sans', sans-serif";
        ctx.globalAlpha = 0.4;
        ctx.fillText("myhue.co", size / 2, size - 80);
        ctx.globalAlpha = 1;

        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = "my-hue.png"; a.click();
          URL.revokeObjectURL(url);
        });
      };

      return (
        <div
          onClick={onContinue}
          style={{
            minHeight: "100vh",
            background: primary.color,
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            padding: isDesktop ? "80px 64px" : "60px 32px",
            cursor: "pointer",
            position: "relative",
          }}
        >
          {/* Wordmark */}
          <div style={{ position: "absolute", top: 28, left: 28, display: "flex", alignItems: "center", gap: 10 }}>
            <SpinMark size={32} paused />
            <span style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: textColor, opacity: 0.7 }}>Hue</span>
          </div>

          {/* The sentence — or loading state */}
          <div ref={cardRef} style={{ textAlign: "center", maxWidth: isDesktop ? 680 : 340 }}>
            {sentence === null ? (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14 }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: textColor, opacity: 0.5, animation: "bounce 1.3s ease-in-out infinite" }} />
                <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 16, color: textColor, opacity: 0.5, margin: 0, fontStyle: "italic" }}>
                  Writing your sentence…
                </p>
              </div>
            ) : (
              <p style={{
                fontFamily: "'Fraunces', serif",
                fontSize: isDesktop ? 52 : 34,
                fontWeight: 700,
                fontStyle: "italic",
                color: textColor,
                lineHeight: 1.2,
                letterSpacing: "-0.02em",
                margin: 0,
                animation: "fadeUp 0.5s ease both",
              }}>
                "{sentence}"
              </p>
            )}
          </div>

          {/* Share / Download — only shown when sentence is ready */}
          {sentence && (
            <div
              style={{ display: "flex", gap: 12, marginTop: isDesktop ? 56 : 40 }}
              onClick={e => e.stopPropagation()}
            >
              <button
                onClick={handleShare}
                style={{
                  background: "transparent",
                  border: `1.5px solid ${textColor}`,
                  borderRadius: 99,
                  padding: "12px 28px",
                  color: textColor,
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontWeight: 600, fontSize: 14,
                  cursor: "pointer", opacity: 0.85,
                }}
              >
                {copied ? "Copied" : "Share"}
              </button>
              <button
                onClick={handleDownload}
                style={{
                  background: "transparent",
                  border: `1.5px solid ${textColor}`,
                  borderRadius: 99,
                  padding: "12px 28px",
                  color: textColor,
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontWeight: 600, fontSize: 14,
                  cursor: "pointer", opacity: 0.85,
                }}
              >
                Save as image
              </button>
            </div>
          )}

          {/* Continue affordance */}
          <p style={{
            position: "absolute",
            bottom: 36,
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: 13, color: textColor,
            opacity: 0.35, margin: 0,
            letterSpacing: "0.02em",
          }}>
            Tap anywhere to continue
          </p>

      );
    }

        .sort((a, b) => b.score - a.score);

      useEffect(() => { saveProfile(scores, ranked); }, []);

      const rankLabels = ["Instinctive", "Fluent", "Intentional", "Developing"];

      // ── Share modal state ──
      const [shareOpen,    setShareOpen]    = useState(false);
      const [shareResult,  setShareResult]  = useState(null);   // { token, url, expiresAt, mode }
      const [shareLoading, setShareLoading] = useState(false);
      const [shareCopied,  setShareCopied]  = useState(false);
      const [shareRevoked, setShareRevoked] = useState(false);

      const handleShareCreate = async (mode) => {
        setShareLoading(true);
        try {
          const res = await fetch("/api/share", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mode }),
          });
          const data = await res.json();
          if (data.url) {
            setShareResult(data);
            setShareRevoked(false);
            setShareCopied(false);
          }
        } catch {}
        finally { setShareLoading(false); }
      };

      const handleCopyLink = async () => {
        if (!shareResult?.url) return;
        await navigator.clipboard.writeText(shareResult.url).catch(() => {});
        setShareCopied(true);
        setTimeout(() => setShareCopied(false), 2000);
      };

      const handleRevoke = async () => {
        if (!shareResult?.token) return;
        await fetch(`/api/share/${shareResult.token}`, { method: "DELETE" }).catch(() => {});
        setShareRevoked(true);
        setShareResult(null);
      };

      const ShareModal = () => {
        if (!shareOpen) return null;
        const linkLabel = shareResult?.mode === "link"   ? "Link active for 30 days"
                        : shareResult?.mode === "session" ? "Link active for 8 hours"
                        : null;
        return (
          <div onClick={() => setShareOpen(false)} style={{
            position: "fixed", inset: 0, zIndex: 200,
            background: "rgba(26,20,16,0.45)",
            display: "flex", alignItems: "flex-end",
            justifyContent: "center",
          }}>
            <div onClick={e => e.stopPropagation()} style={{
              background: "#fff",
              borderRadius: isDesktop ? 24 : "24px 24px 0 0",
              padding: isDesktop ? "36px 40px" : "32px 24px 40px",
              width: isDesktop ? 480 : "100%",
              maxWidth: "100%",
              marginBottom: isDesktop ? 32 : 0,
              animation: "fadeUp 0.25s ease both",
            }}>
              <p style={{
                fontFamily: "'Fraunces', serif",
                fontSize: 22, fontWeight: 700,
                color: C.ink, margin: "0 0 6px",
              }}>Share your profile</p>
              <p style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 13, lineHeight: 1.6,
                color: C.stone, margin: "0 0 24px",
              }}>Your profile is yours. Your employer sees only the team picture — never your individual result. But sharing your profile with colleagues, when you choose to, is one of the most powerful things Hue can facilitate.</p>

              {shareRevoked && (
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: 13, color: C.stone,
                  fontStyle: "italic", margin: "0 0 16px",
                }}>Link revoked.</p>
              )}

              {shareResult && !shareRevoked ? (
                <div>
                  <div style={{
                    background: C.cream, borderRadius: 12,
                    padding: "14px 16px",
                    border: `1.5px solid ${C.sand}`,
                    marginBottom: 10,
                  }}>
                    <p style={{
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 12, color: C.stone,
                      margin: "0 0 6px", wordBreak: "break-all",
                    }}>{shareResult.url}</p>
                    <button onClick={handleCopyLink} style={{
                      background: C.ink, color: "#fff",
                      border: "none", borderRadius: 99,
                      padding: "7px 18px",
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 12, fontWeight: 600,
                      cursor: "pointer",
                    }}>{shareCopied ? "Copied!" : "Copy link"}</button>
                  </div>
                  <p style={{
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: 12, color: C.stone,
                    margin: "0 0 8px",
                  }}>{linkLabel}</p>
                  <button onClick={handleRevoke} style={{
                    background: "none", border: "none", padding: 0,
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: 12, color: C.stone,
                    textDecoration: "underline", cursor: "pointer",
                    opacity: 0.7,
                  }}>Revoke</button>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <button
                    disabled={shareLoading}
                    onClick={() => handleShareCreate("link")}
                    style={{
                      background: C.ink, color: "#fff",
                      border: "none", borderRadius: 14,
                      padding: "16px 20px",
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 14, fontWeight: 600,
                      cursor: shareLoading ? "default" : "pointer",
                      textAlign: "left",
                      opacity: shareLoading ? 0.6 : 1,
                    }}>
                    <div>Share a link</div>
                    <div style={{ fontSize: 12, fontWeight: 400, opacity: 0.7, marginTop: 3 }}>30-day link — for colleagues</div>
                  </button>
                  <button
                    disabled={shareLoading}
                    onClick={() => handleShareCreate("session")}
                    style={{
                      background: "#fff", color: C.ink,
                      border: `1.5px solid ${C.sand}`,
                      borderRadius: 14,
                      padding: "16px 20px",
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 14, fontWeight: 600,
                      cursor: shareLoading ? "default" : "pointer",
                      textAlign: "left",
                      opacity: shareLoading ? 0.6 : 1,
                    }}>
                    <div>Share in a session</div>
                    <div style={{ fontSize: 12, fontWeight: 400, opacity: 0.6, marginTop: 3 }}>8-hour link — for workshops</div>
                  </button>
                </div>
              )}

              <button onClick={() => setShareOpen(false)} style={{
                display: "block", marginTop: 20,
                background: "none", border: "none", padding: 0,
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 12, color: C.stone,
                cursor: "pointer", opacity: 0.6,
              }}>Close</button>
            </div>
          </div>
        );
      };
      const primary = ranked[0];
      const obs = OBSERVATIONS[primary.id];
      const heroTextColor = primary.id === "glow" ? C.ink : "#fff";
      const heroSubColor = primary.id === "glow" ? "rgba(26,20,16,0.6)" : "rgba(255,255,255,0.7)";

      const EnergyCard = ({ e, i }) => (
        <div style={{
          background: "#fff",
          borderRadius: 20,
          padding: isDesktop ? "24px 24px" : "18px 20px",
          border: `1.5px solid ${C.sand}`,
          animation: `fadeUp 0.35s ease ${i * 0.1}s both`,
        }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 13, height: 13, borderRadius: "50%", background: e.color, flexShrink: 0, marginTop: 4 }} />
              <div>
                <div style={{ fontFamily: "'Fraunces', serif", fontSize: isDesktop ? 22 : 21, fontWeight: 700, color: C.ink, lineHeight: 1.2 }}>{e.name}</div>
                <div style={{
                  fontSize: 11, color: C.stone,
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase",
                  marginTop: 2,
                }}>{rankLabels[i]}</div>
              </div>
            </div>
            <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 600, color: C.stone, marginTop: 2 }}>{e.pct}%</span>
          </div>
          <div style={{ height: 6, background: C.sand, borderRadius: 99, overflow: "hidden" }}>
            <div style={{
              height: "100%", background: e.color, borderRadius: 99,
              width: `${e.pct}%`,
              animation: `barGrow 0.9s cubic-bezier(0.23,1,0.32,1) ${0.2 + i * 0.1}s both`,
            }} />
          </div>
          <div style={{ fontSize: 11, color: C.stone, marginTop: 7, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>{e.desc}</div>
          {i > 0 && (
            <p style={{
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              fontSize: 13, lineHeight: 1.65,
              color: C.ink, opacity: 0.75,
              margin: "12px 0 0",
              paddingTop: 12,
              borderTop: `1px solid ${C.sand}`,
            }}>{OBSERVATIONS[e.id].reach[i]}</p>
          )}
        </div>
      );

      return (
        <div style={{ minHeight: "100vh", background: isDesktop ? "transparent" : C.cream }}>
          <div style={{
            maxWidth: isDesktop ? 860 : "100%",
            margin: "0 auto",
            background: isDesktop ? C.cream : "transparent",
            borderRadius: isDesktop ? 32 : 0,
            marginTop: isDesktop ? 32 : 0,
            marginBottom: isDesktop ? 32 : 0,
            overflow: "hidden",
          }}>

            {/* Nav */}
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: isDesktop ? "32px 40px 0" : "24px 20px 0",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <SpinMark size={38} paused />
                <span style={{ fontFamily: "'Fraunces', serif", fontSize: 20, fontWeight: 700, color: C.ink }}>Hue</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <button onClick={() => { setShareOpen(true); setShareResult(null); setShareRevoked(false); }} style={{
                  background: "none", border: `1px solid ${C.sand}`, borderRadius: 99,
                  padding: "6px 14px",
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: 12, fontWeight: 600, color: C.stone,
                  cursor: "pointer",
                }}>Share profile</button>
                <BackButton onBack={onHome} />
              </div>
            </div>
            <ShareModal />

            {/* Observation hero */}
            <div style={{
              background: primary.color,
              margin: isDesktop ? "28px 40px 0" : "20px 0 0",
              borderRadius: isDesktop ? 24 : 0,
              padding: isDesktop ? "52px 56px" : "40px 24px",
              animation: "fadeUp 0.4s ease both",
            }}>
              <p style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 11, fontWeight: 600,
                letterSpacing: "0.12em", textTransform: "uppercase",
                color: heroSubColor, margin: "0 0 20px",
              }}>Your colour energy profile</p>
              <h2 style={{
                fontFamily: "'Fraunces', serif",
                fontSize: isDesktop ? 48 : 36,
                fontWeight: 900, lineHeight: 1.05,
                letterSpacing: "-0.02em",
                color: heroTextColor,
                margin: "0 0 24px",
              }}>{obs.headline}</h2>
              <p style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: isDesktop ? 17 : 15,
                lineHeight: 1.7,
                color: heroTextColor,
                opacity: 0.9,
                margin: "0 0 24px",
                maxWidth: 540,
              }}>{obs.mirror}</p>
              <p style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 11, fontWeight: 600,
                letterSpacing: "0.1em", textTransform: "uppercase",
                color: heroSubColor, margin: "0 0 10px",
              }}>In practice, this tends to look like:</p>
              <ul style={{ margin: 0, padding: "0 0 0 18px", display: "flex", flexDirection: "column", gap: 8 }}>
                {obs.inPractice.map((item, idx) => (
                  <li key={idx} style={{
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: isDesktop ? 15 : 14,
                    lineHeight: 1.65,
                    color: heroTextColor,
                    opacity: 0.85,
                  }}>{item}</li>
                ))}
              </ul>
            </div>

            {/* Energy cards */}
            <div style={{ padding: isDesktop ? "32px 40px 0" : "24px 20px 0" }}>
              <p style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 12, fontWeight: 600,
                letterSpacing: "0.08em", textTransform: "uppercase",
                color: C.stone, margin: "0 0 16px",
              }}>Your full colour picture</p>

              {isDesktop ? (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                  {ranked.map((e, i) => <EnergyCard key={e.id} e={e} i={i} />)}
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {ranked.map((e, i) => <EnergyCard key={e.id} e={e} i={i} />)}
                </div>
              )}
            </div>

            {/* Flex & Surprise */}
            <div style={{ padding: isDesktop ? "32px 40px 0" : "24px 20px 0", display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{
                background: "#fff", borderRadius: 20,
                padding: isDesktop ? "28px 28px" : "20px 20px",
                border: `1.5px solid ${C.sand}`,
              }}>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: 11, fontWeight: 600,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  color: primary.color, margin: "0 0 10px",
                }}>When you reach for {obs.flexEnergy} energy</p>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: isDesktop ? 15 : 14, lineHeight: 1.7,
                  color: C.ink, margin: 0,
                }}>{obs.flex}</p>
              </div>
              <div style={{
                background: "#fff", borderRadius: 20,
                padding: isDesktop ? "28px 28px" : "20px 20px",
                border: `1.5px solid ${C.sand}`,
              }}>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: 11, fontWeight: 600,
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  color: primary.color, margin: "0 0 10px",
                }}>You might surprise people</p>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: isDesktop ? 15 : 14, lineHeight: 1.7,
                  color: C.ink, margin: 0,
                }}>{obs.surprise}</p>
              </div>
            </div>

            {/* Bespoke observation */}
            {bespokeObs !== undefined && (
              <div style={{ padding: isDesktop ? "14px 40px 0" : "14px 20px 0" }}>
                {bespokeObs === null ? (
                  <div style={{
                    background: "#fff", borderRadius: 20,
                    padding: isDesktop ? "28px 28px" : "20px 20px",
                    border: `1.5px solid ${C.sand}`,
                    display: "flex", alignItems: "center", gap: 12,
                  }}>
                    <div style={{
                      width: 8, height: 8, borderRadius: "50%", background: primary.color,
                      animation: "bounce 1.3s ease-in-out infinite",
                      flexShrink: 0,
                    }} />
                    <p style={{
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 14, color: C.stone, margin: 0, fontStyle: "italic",
                    }}>Writing something just for you…</p>
                  </div>
                ) : (
                  <div style={{
                    background: "linear-gradient(#fff, #fff) padding-box, linear-gradient(135deg, #D92010, #F5D000, #1A8C4E, #1755B8) border-box",
                    borderRadius: 20,
                    padding: isDesktop ? "28px 28px" : "20px 20px",
                    border: "1.5px solid transparent",
                    animation: "fadeUp 0.4s ease both",
                  }}>
                    <p style={{
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: 11, fontWeight: 600,
                      letterSpacing: "0.08em", textTransform: "uppercase",
                      color: primary.color, margin: "0 0 10px",
                    }}>Only you</p>
                    <p style={{
                      fontFamily: "'Plus Jakarta Sans', sans-serif",
                      fontSize: isDesktop ? 15 : 14, lineHeight: 1.7,
                      color: C.ink, margin: 0,
                    }}>{bespokeObs}</p>
                  </div>
                )}
              </div>
            )}

            {/* CTA */}
            <div style={{ padding: isDesktop ? "32px 40px 48px" : "24px 20px 48px" }}>
              <button
                onClick={() => onContinue(ranked)}
                style={{
                  width: isDesktop ? "auto" : "100%",
                  display: "block",
                  margin: isDesktop ? "0 auto" : "0",
                  padding: isDesktop ? "16px 56px" : "16px",
                  background: C.ink, color: C.cream,
                  border: "none", borderRadius: 99,
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontWeight: 700, fontSize: 16,
                  cursor: "pointer",
                }}
              >
                Talk with Hue about your results
              </button>
              <p style={{
                fontFamily: "'Fraunces', serif",
                fontSize: 13,
                fontWeight: 500,
                fontStyle: "italic",
                color: C.stone,
                textAlign: "center",
                marginTop: 20,
                opacity: 0.6,
              }}>Four energies. Infinite versions of you.</p>
            </div>

          </div>
        </div>
      );
    }

    // ─── Suggested questions ──────────────────────────────────────────────────
    function getResultsSuggestions(ranked) {
      if (!ranked || ranked.length < 4) return [
        "How does this work?",
        "What does my profile say about how I work with others?",
        "Where am I most likely to get in my own way?",
        "Which energy should I try to use more deliberately?",
        "What should I pay attention to this week?",
      ];
      const primary   = ranked[0];
      const second    = ranked[1];
      const developing = ranked[3];
      return [
        `Tell me more about my ${primary.name} energy.`,
        `What does it mean that ${developing.name} is my Developing energy?`,
        `How do ${primary.name} and ${second.name} show up together?`,
        "Where am I most likely to get in my own way?",
        "What should I pay attention to this week?",
      ];
    }

    const RETURNING_SUGGESTIONS = [
      "I've got something I'm working through — can we talk?",
      "Where do you think I'm playing it safe?",
      "What's the most useful thing we could focus on right now?",
      "I want to get better at one thing — where do you suggest I start?",
      "What would raising my quieter energy look like in practice?",
    ];

    // Track how many times user has opened the companion chat
    function getChatVisitCount() {
      return parseInt(localStorage.getItem("hue_chat_visits") || "0", 10);
    }
    function incrementChatVisitCount() {
      localStorage.setItem("hue_chat_visits", getChatVisitCount() + 1);
    }

    // Rotate suggestions so different questions appear each visit
    // Visit 1: first 3. Visit 2: last 2 (different set). Visit 3+: none.
    function suggestionsToShow(all, visitCount) {
      if (visitCount >= 3) return [];
      if (visitCount === 2) return all.slice(3);
      return all.slice(0, 3);
    }

    function SuggestedQuestions({ questions, onSelect, isDesktop }) {
      if (!questions.length) return null;
      return (
        <div style={{
          padding: "0 16px 12px",
          // Mobile: single horizontal scrollable row. Desktop: wrap.
          display: "flex",
          flexWrap: isDesktop ? "wrap" : "nowrap",
          gap: 8,
          overflowX: isDesktop ? "visible" : "auto",
          WebkitOverflowScrolling: "touch",
          scrollbarWidth: "none",
          msOverflowStyle: "none",
        }}>
          {questions.map((q, i) => (
            <button
              key={i}
              onClick={() => onSelect(q)}
              style={{
                background: "#fff",
                border: `1.5px solid ${C.sand}`,
                borderRadius: 99,
                padding: "8px 14px",
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 13,
                fontWeight: 500,
                color: C.ink,
                cursor: "pointer",
                lineHeight: 1.3,
                textAlign: "left",
                whiteSpace: isDesktop ? "normal" : "nowrap",
                flexShrink: 0,
                transition: "border-color 0.15s, background 0.15s",
              }}
              onMouseEnter={e => {
                e.currentTarget.style.borderColor = C.ink;
                e.currentTarget.style.background = C.cream;
              }}
              onMouseLeave={e => {
                e.currentTarget.style.borderColor = C.sand;
                e.currentTarget.style.background = "#fff";
              }}
            >
              {q}
            </button>
          ))}
        </div>
      );
    }

    // ─── Companion screen ─────────────────────────────────────────────────────
    function CompanionScreen({ ranked, onHome, returning = false }) {
      const isDesktop = useIsDesktop();
      const [display, setDisplay] = useState([]);
      const [history, setHistory] = useState([]);
      const [input, setInput]     = useState("");
      const [typing, setTyping]   = useState(false);
      const [hasSentMessage, setHasSentMessage] = useState(false);
      const [summaries, setSummaries] = useState(null); // null = loading
      const [anniversary, setAnniversary] = useState(null);
      const bottomRef = useRef(null);
      const inputRef  = useRef(null);
      const visitCount = useRef(getChatVisitCount());
      const allSuggestions = returning ? RETURNING_SUGGESTIONS : getResultsSuggestions(ranked);
      const suggestions = suggestionsToShow(allSuggestions, visitCount.current);

      // Rebuild system prompt whenever summaries or anniversary loads
      const system = buildCompanionPrompt(ranked, summaries || [], anniversary);

      useEffect(() => { incrementChatVisitCount(); }, []);

      // Load conversation summaries + anniversary from server on mount
      useEffect(() => {
        fetch("/api/summaries")
          .then(r => r.json())
          .then(d => {
            setSummaries(d.summaries || []);
            setAnniversary(d.anniversary || null);
          })
          .catch(() => setSummaries([]));
      }, []);

      // Fire opener once summaries are resolved
      useEffect(() => {
        if (summaries === null) return; // still loading

        if (returning || summaries.length > 0 || anniversary) {
          // Reflective opener — Claude generates a response informed by memory (and anniversary if present)
          (async () => {
            setTyping(true);
            try {
              const seed = [{ role: "user", content: "Hi Hue, I'm back." }];
              const reply = await callClaude(seed, buildCompanionPrompt(ranked, summaries, anniversary));
              setHistory([
                { role: "user",      content: seed[0].content },
                { role: "assistant", content: reply },
              ]);
              setDisplay([{ from: "hue", text: reply }]);
            } catch {
              setDisplay([{ from: "hue", text: "Something went wrong. Try refreshing the page." }]);
            } finally {
              setTyping(false);
            }
          })();
        } else {
          // First visit, no history — simple hardcoded opener, no API call needed
          const primary = ranked[0];
          setDisplay([{ from: "hue", text: `Your full colour profile is here. You tend to reach for ${primary.name} first — your Instinctive energy. What would you like to explore?` }]);
        }
      }, [summaries]);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [display, typing]);

      useEffect(() => {
        if (!typing && display.length > 0) inputRef.current?.focus();
      }, [typing]);

      const send = async () => {
        const text = input.trim();
        if (!text || typing) return;
        setInput("");
        setHasSentMessage(true);
        const newHistory = [...history, { role: "user", content: text }];
        setHistory(newHistory);
        setDisplay(d => [...d, { from: "user", text }]);
        setTyping(true);
        try {
          const reply = await callClaude(newHistory, system);
          const fullHistory = [...newHistory, { role: "assistant", content: reply }];
          setHistory(fullHistory);
          setDisplay(d => [...d, { from: "hue", text: reply }]);
          // Checkpoint: summarise every 5 user messages
          const userMsgCount = newHistory.filter(m => m.role === "user").length;
          if (userMsgCount % 5 === 0) summariseConversation(fullHistory);
        } catch {
          setDisplay(d => [...d, { from: "hue", text: "Something went wrong. Try again." }]);
        } finally {
          setTyping(false);
        }
      };

      return (
        <ChatFrame isDesktop={isDesktop}>
          <div style={{ background: "transparent", display: "flex", flexDirection: "column", flex: 1 }}>
            <div style={{
              padding: "18px 20px 14px",
              display: "flex", alignItems: "center", gap: 12,
              borderBottom: `1px solid ${C.sand}`,
              background: C.cream,
              position: "sticky", top: 0, zIndex: 10,
              borderRadius: isDesktop ? "32px 32px 0 0" : 0,
            }}>
              <SpinMark size={38} paused />
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: C.ink }}>Hue</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {ranked.map(e => (
                    <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 4 }}>

    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("welcome");
      const [scores, setScores] = useState(null);
      const [ranked, setRanked] = useState(null);
      const [savedProfile, setSavedProfile] = useState(() => loadProfile());

      // Beta session — null until /api/me resolves
      const [betaUser,    setBetaUser]    = useState(null);
      const [betaChecked, setBetaChecked] = useState(false);

      // Check for existing session and/or invite token on mount
      useEffect(() => {
        (async () => {
          try {
            const res  = await fetch("/api/me");
            const data = await res.json();
            if (data.user) {
              setBetaUser(data.user);
              // If server has a completed assessment but this device has no localStorage profile,
              // hydrate savedProfile from server so returning user view shows on any device
              if (data.user.assessmentCompleted && data.user.scores && data.user.labels && !loadProfile()) {
                const labelOrder = { "Instinctive": 0, "Fluent": 1, "Intentional": 2, "Developing": 3 };
                const rankedIds = Object.entries(data.user.labels)
                  .sort(([, a], [, b]) => labelOrder[a] - labelOrder[b])
                  .map(([id]) => id);
                saveProfile(data.user.scores, rankedIds.map(id => ({ id })));
                setSavedProfile(loadProfile());
              }
            }
          } catch {}
          finally { setBetaChecked(true); }
        })();
      }, []);

      // Invite token from URL (supports both /?invite=X and /register?invite=X)
      const inviteToken = new URLSearchParams(window.location.search).get("invite");
      const isRegisterPath = window.location.pathname === "/register";

      // Shared profile path — /shared/:token
      const sharedPathMatch = window.location.pathname.match(/^\/shared\/([^/]+)$/);
      const sharedToken = sharedPathMatch ? sharedPathMatch[1] : null;

      // Hook browser back button into app navigation
      useEffect(() => {
        window.history.replaceState({ screen: "welcome" }, "");
        const handlePop = (e) => {
          const s = e.state?.screen || "welcome";
          // Only navigate back to results if scores are still in memory
          if (s === "results" && !scores) setScreen("welcome");
          else if (s === "sentence" && !ranked) setScreen("welcome");
          else if (s === "companion" && !ranked) setScreen("welcome");
          else setScreen(s);
        };
        window.addEventListener("popstate", handlePop);
        return () => window.removeEventListener("popstate", handlePop);
      }, [scores, ranked]);

      const navigate = (newScreen) => {
        if (newScreen === "welcome") setSavedProfile(loadProfile());
        window.history.pushState({ screen: newScreen }, "");
        setScreen(newScreen);
      };

      const handleLogin = (user) => {
        setBetaUser(user);
        if (user.assessmentCompleted && user.scores && user.labels) {
          const labelOrder = { "Instinctive": 0, "Fluent": 1, "Intentional": 2, "Developing": 3 };
          const rankedIds = Object.entries(user.labels)
            .sort(([, a], [, b]) => labelOrder[a] - labelOrder[b])
            .map(([id]) => id);
          saveProfile(user.scores, rankedIds.map(id => ({ id })));
          setSavedProfile(loadProfile());
        }
        navigate("welcome");
      };

      const restoreSaved = () => {
        const restoredRanked = profileToRanked(savedProfile);
        setScores(savedProfile.scores);
        setRanked(restoredRanked);
        return restoredRanked;
      };

      const [returningToChat, setReturningToChat] = useState(false);
      const [bespokeObs,  setBespokeObs]  = useState(undefined); // undefined = not expected; null = loading; string = ready
      const [oneSentence, setOneSentence] = useState(undefined); // same pattern

      // onChat(true) → view results first; onChat() → go straight to companion
      const handleChat = (viewResults = false) => {
        const restoredRanked = restoreSaved();
        if (viewResults) {
          navigate("results");
        } else {
          setRanked(restoredRanked);
          setReturningToChat(true);
          navigate("companion");
        }
      };

      // Show registration screen if on /register path or invite token present,
      // and user is not already registered. Wait for /api/me to resolve first.
      const showRegister = betaChecked && !betaUser && (isRegisterPath || inviteToken);

      // SIMON: This is where free-tier restriction would be enforced in future.
      // When the free tier is limited to dominant energy only, non-beta users
      // would get a restricted assessment. For now the public app is unchanged.
      const isBeta = !!betaUser;

      const handleAssessmentComplete = async (s, conversationHistory) => {
        setScores(s);
        setBespokeObs(null);   // null = loading
        setOneSentence(null);  // null = loading
        navigate("results");

        if (conversationHistory?.length > 0) {
          const payload = { messages: conversationHistory, scores: s };
          // Bespoke observation (fire and forget)
          fetch("/api/bespoke-observation", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })
            .then(r => r.json())
            .then(d => setBespokeObs(d.observation || undefined))
            .catch(() => setBespokeObs(undefined));
          // One sentence (fire and forget — parallel)
          fetch("/api/one-sentence", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })
            .then(r => r.json())
            .then(d => setOneSentence(d.sentence || undefined))
            .catch(() => setOneSentence(undefined));
        }

        if (isBeta) {
          const total     = Object.values(s).reduce((a, b) => a + b, 0);
          const rankedIds = [...Object.entries(s)]
            .sort(([, a], [, b]) => b - a)
            .map(([id]) => id);
          const labelNames = ["Instinctive", "Fluent", "Intentional", "Developing"];
          const labels     = Object.fromEntries(rankedIds.map((id, i) => [id, labelNames[i]]));
          fetch("/api/complete", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ scores: s, labels, dominantEnergy: rankedIds[0] }),
          }).catch(() => {});
        }
      };

      return (
        <>
          <style>{`
            input::placeholder { color: ${C.stone}; }
            input:focus { border-color: ${C.ink} !important; outline: none; }
          `}</style>
          {sharedToken ? (
            <SharedProfileScreen token={sharedToken} />
          ) : showRegister ? (
            <RegisterScreen
              inviteToken={inviteToken}
              onRegistered={user => { setBetaUser(user); navigate("welcome"); }}
            />
          ) : (
            <>
              {screen === "welcome" && (
                <WelcomeScreen
                  onStart={() => {
                    if (localStorage.getItem("hue_consent")) navigate("chat");
                    else navigate("consent");
                  }}
                  onChat={handleChat}
                  savedProfile={savedProfile}
                  onSignIn={() => navigate("sign-in")}
                />
              )}
              {screen === "sign-in" && (
                <LoginScreen
                  onLogin={handleLogin}
                  onBack={() => navigate("welcome")}
                />
              )}
              {screen === "consent" && (
                <ConsentScreen onComplete={() => navigate("chat")} />
              )}
              {screen === "chat" && (
                <ChatScreen
                  onComplete={handleAssessmentComplete}
                  onHome={() => navigate("welcome")}
                />
              )}
              {screen === "results" && scores && (
                <ResultsScreen
                  scores={scores}
                  bespokeObs={bespokeObs}
                  onContinue={r => {
                    setRanked(r);
                    setReturningToChat(false);
                    // Skip sentence screen for returning users viewing old results (oneSentence never loaded)
                    navigate(oneSentence === undefined ? "companion" : "sentence");
                  }}
                  onHome={() => navigate("welcome")}
                />
              )}
              {screen === "sentence" && ranked && (
                <OneSentenceScreen
                  sentence={oneSentence}
                  primary={ranked[0]}
                  onContinue={() => navigate("companion")}
                />
              )}
              {screen === "companion" && ranked && (
                <CompanionScreen ranked={ranked} onHome={() => navigate("welcome")} returning={returningToChat} />
              )}
            </>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
