<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hue</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #FDFAF4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    #root {
      min-height: 100vh;
      width: 100%;
    }
    @media (min-width: 768px) {
      body { background: #F5F0E8; }
    }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes barGrow {
      from { width: 0%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    /* Assessment progress line — see hue-assessment-v2-code-brief.md §5 */
    @keyframes hue-drift {
      from { background-position-x: 100%; }
      to   { background-position-x: 0%; }
    }
    .hue-progress-line {
      position: relative;
      width: 100%;
      height: 3px;
      background: #E8DFC8;
      border-radius: 2px;
      overflow: hidden;
    }
    .hue-progress-line::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        #D92010, #F5D000, #1A8C4E, #1755B8,
        #D92010, #F5D000, #1A8C4E, #1755B8);
      background-size: 200% 100%;
      opacity: 0.22;
      animation: hue-drift 14s linear infinite;
      pointer-events: none;
    }
    .hue-progress-line .hue-progress-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg,
        #D92010, #F5D000, #1A8C4E, #1755B8,
        #D92010, #F5D000, #1A8C4E, #1755B8);
      background-size: 200% 100%;
      animation: hue-drift 14s linear infinite;
      transition: width 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
      border-radius: 2px;
    }
    @media (prefers-reduced-motion: reduce) {
      .hue-progress-line::before,
      .hue-progress-line .hue-progress-fill { animation: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Design tokens ────────────────────────────────────────────────────────
    const C = {
      cream: "#FDFAF4", ink: "#1A1410", sand: "#E8DFC8", stone: "#9B8E7E",
      stoneSoft: "#ECE6D6", stonePress: "#E0D8C2",
      spark: "#D92010", sparkLight: "#FFF0ED",
      glow:  "#F5D000", glowLight:  "#FEFCE8", glowOnLight: "#C8960C",
      tend:  "#1A8C4E", tendLight:  "#E8F7EF",
      flow:  "#1755B8", flowLight:  "#E8F0FC",
    };

    const ENERGIES = [
      { id: "spark", name: "Spark", color: C.spark, light: C.sparkLight, desc: "Drive · Action · Ignition" },
      { id: "glow",  name: "Glow",  color: C.glow,  light: C.glowLight,  desc: "Warmth · Optimism · Connection" },
      { id: "tend",  name: "Tend",  color: C.tend,  light: C.tendLight,  desc: "Steadiness · Care · Depth" },
      { id: "flow",  name: "Flow",  color: C.flow,  light: C.flowLight,  desc: "Clarity · Systems · Vision" },
    ];

    // ─── EnergyWord — renders energy names in their colour ────────────────────
    // Usage: <EnergyWord name="Spark" /> or <EnergyWord name="Tend" bold />
    // Note: Glow uses glowOnLight (#8B7500) for text on light backgrounds.
    // The brand colour (#F5D000) stays for fills, bars, dots, backgrounds, canvas card.
    const ENERGY_COLOR_MAP = { Spark: C.spark, Glow: C.glowOnLight, Tend: C.tend, Flow: C.flow };
    function EnergyWord({ name, bold = false, size }) {
      const color = ENERGY_COLOR_MAP[name];
      if (!color) return name;
      return (
        <span style={{
          color,
          fontWeight: bold ? 700 : "inherit",
          fontSize: size || "inherit",
        }}>{name}</span>
      );
    }

    // ─── colorize — wraps energy names in EnergyWord within any string ────────
    // Usage: {colorize(someText)}  returns a React fragment with coloured words.
    const ENERGY_NAME_RE = /(Spark|Glow|Tend|Flow)/g;
    function colorize(text) {
      if (!text) return text;
      const parts = text.split(ENERGY_NAME_RE);
      if (parts.length === 1) return text;
      return parts.map((part, i) =>
        ENERGY_COLOR_MAP[part] ? <EnergyWord key={i} name={part} /> : part
      );
    }

    // ─── Energy Icons — SVG line icons for each energy ─────────────────────────
    // Usage: <EnergyIcon energy="spark" size={28} />
    function EnergyIcon({ energy, size = 28, noContainer = false }) {
      // Stroke weight scales inversely with size
      const sw = size >= 64 ? 1.8 : size >= 40 ? 2.0 : size >= 28 ? 2.2 : 2.4;
      const e = ENERGIES.find(x => x.id === energy) || ENERGIES[0];
      const svgProps = {
        width: size * 0.65, height: size * 0.65,
        viewBox: "0 0 24 24", fill: "none",
        stroke: e.color, strokeWidth: sw,
        strokeLinecap: "round", strokeLinejoin: "round",
        style: { display: "block" },
      };

      const iconSvg = energy === "spark" ? (
        React.createElement("svg", svgProps, React.createElement("path", { d: "M13 2L5 13h7l-1 9 9-12h-7z" }))
      ) : energy === "glow" ? (
        React.createElement("svg", svgProps,
          React.createElement("circle", { cx: 12, cy: 12, r: 9 }),
          React.createElement("circle", { cx: 12, cy: 12, r: 4 })
        )
      ) : energy === "tend" ? (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M19 3 C18 6 11 5 8 9 C5 13 4 18 5 21 C6 18 13 19 16 15 C19 11 20 6 19 3 Z" }),
          React.createElement("path", { d: "M19 3 C15 8 10 14 5 21" }),
          React.createElement("line", { x1: 5, y1: 21, x2: 3, y2: 24 })
        )
      ) : (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M3 9 C6 6 9 6 12 9 C15 12 18 12 21 9" }),
          React.createElement("path", { d: "M3 15 C6 12 9 12 12 15 C15 18 18 18 21 15" })
        )
      );

      if (noContainer) return iconSvg;

      return (
        <div style={{
          width: size, height: size,
          borderRadius: size * 0.28,
          background: e.light,
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
        }}>
          {iconSvg}
        </div>
      );
    }

    // ─── Nav Icons — Home, Share, Save ───────────────────────────────────────────
    function NavIcon({ type, onClick, active = false }) {
      const btnStyle = {
        width: 36, height: 36, borderRadius: 10,
        background: active ? `rgba(0,0,0,0.1)` : `rgba(0,0,0,0.05)`,
        border: "none", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, padding: 0,
      };
      const svgProps = {
        width: 20, height: 20, viewBox: "0 0 24 24",
        fill: "none", stroke: C.ink, strokeWidth: 1.8,
        strokeLinecap: "round", strokeLinejoin: "round",
        style: { display: "block" },
      };

      const icon = type === "home" ? (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" }),
          React.createElement("path", { d: "M9 21V12h6v9" })
        )
      ) : type === "share" ? (
        React.createElement("svg", svgProps,
          React.createElement("circle", { cx: 18, cy: 5, r: 3 }),
          React.createElement("circle", { cx: 6, cy: 12, r: 3 }),
          React.createElement("circle", { cx: 18, cy: 19, r: 3 }),
          React.createElement("path", { d: "M8.59 13.51l6.83 3.98M15.41 6.51L8.59 10.49" })
        )
      ) : type === "save" ? (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" }),
          React.createElement("path", { d: "M17 21v-8H7v8M7 3v5h8" })
        )
      ) : type === "checkin" ? (
        React.createElement("svg", svgProps,
          React.createElement("circle", { cx: 12, cy: 12, r: 9 }),
          React.createElement("path", { d: "M12 8v4M12 16h.01" })
        )
      ) : null;

      return <button onClick={onClick} style={btnStyle}>{icon}</button>;
    }

    // ─── Responsive hook ──────────────────────────────────────────────────────
    function useIsDesktop() {
      const [isDesktop, setIsDesktop] = useState(() => window.innerWidth >= 768);
      useEffect(() => {
        const fn = () => setIsDesktop(window.innerWidth >= 768);
        window.addEventListener("resize", fn);
        return () => window.removeEventListener("resize", fn);
      }, []);
      return isDesktop;
    }

    // ─── localStorage ─────────────────────────────────────────────────────────
    const STORAGE_KEY = "hue_profile_v1";
    const RETAKE_LOCKOUT_DAYS = 90;

    function saveProfile(scores, ranked, savedAt = Date.now()) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          date: new Date(savedAt).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }),
          savedAt,
          scores,
          rankedIds: ranked.map(e => e.id),
        }));
      } catch {}
    }

    function loadProfile() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const p = JSON.parse(raw);
        // Migrate Root → Tend in any profile saved before the rename
        if (p.scores?.root !== undefined) {
          p.scores.tend = p.scores.root;
          delete p.scores.root;
        }
        if (p.rankedIds) {
          p.rankedIds = p.rankedIds.map(id => id === "root" ? "tend" : id);
        }
        return p;
      } catch { return null; }
    }

    function profileToRanked(saved) {
      const total = Object.values(saved.scores).reduce((a, b) => a + b, 0);
      return saved.rankedIds.map(id => {
        const e = ENERGIES.find(e => e.id === id);
        return { ...e, score: saved.scores[id], pct: Math.round((saved.scores[id] / total) * 100) };
      });
    }

    function retakeAvailableDate(saved) {
      if (!saved || !saved.savedAt) return null;
      const unlockMs = saved.savedAt + RETAKE_LOCKOUT_DAYS * 24 * 60 * 60 * 1000;
      return unlockMs > Date.now() ? new Date(unlockMs) : null;
    }

    // ─── Prompts ──────────────────────────────────────────────────────────────
    const ASSESSMENT_PROMPT = `You are Hue — a warm, curious, and genuinely insightful companion helping people discover their colour energy profile through natural conversation. Warm, occasionally witty, never corporate.

Hue's model is grounded in Jungian analytical psychology — specifically Jung's insight that psychological type describes a habitual attitude (a tendency and preference, not a fixed capability), and that all four functions are present in every person, varying only in reach order. Hue's four energies are a contemporary expression of this framework.

Four colour energies (preferences/tendencies, NOT capabilities):
- Spark (red): reaches for action, momentum, going first, directness
- Glow (yellow): reaches for people, connection, ideas, enthusiasm
- Tend (green): reaches for steadiness, inclusion, relationships, listening
- Flow (blue): reaches for clarity, rigour, the right path, understanding before acting

SCORING — for each of the four energies, attend to these six dimensions throughout the conversation:

1. Spontaneous choice — which energy does the person default to when describing situations unprompted? The energy that appears without prompting is diagnostically most significant.

2. Effort language — are natural behaviours described as effortless ("I just...", "naturally I...", "it felt obvious to...") or deliberate ("I had to force myself...", "I knew I should...", "it took more out of me...")? Instinctive energies are described without friction. Non-instinctive energies carry effort language.

3. Frequency signals — how often does each energy appear across multiple independent situations in the conversation? An energy mentioned across many different contexts carries more diagnostic weight than one mentioned once.

4. Valence — is the energy described with positive affect (preference, enjoyment, satisfaction) or negative affect (cost, drain, effort)? Valence distinguishes genuine preference from compliant behaviour.

5. Cross-context consistency — does the same energy appear in descriptions of different life contexts: work, relationships, pressure situations, low-stakes moments? Stable preference shows up across contexts.

6. Recovery pattern — what does the person instinctively reach for when things go wrong, under pressure, or when situations become ambiguous? Recovery energy is diagnostically significant and often the most revealing signal.

Every question you ask should surface these dimensions — ask about what people actually did in specific recent situations, never hypothetical preferences. One question at a time. Keep the conversation natural, not an interview. No emojis. No markdown formatting — plain prose only.

RESERVED WORDS RULE — non-negotiable: the words "spark", "glow", "tend", "flow" are energy names ONLY. Never use them as plain English verbs, nouns, or adjectives when you are speaking. Not "tend to", "natural flow", "could spark", "warm glow". Alternatives: tend→often/naturally/usually; spark→ignite/trigger; flow→rhythm/momentum; glow→warmth/presence.

QUESTION BANK — ask from this bank across the conversation. The first seven
topic areas (original) can be asked in any order that fits the conversation.
The eight additional questions (Q9–Q16) each target a specific scoring signal
and are selected using the coverage logic below.

Original topic bank (exchanges 1–6 draw primarily from here):
- What energises them
- How they handle conflict
- What a great day looks like
- How they make decisions
- What people thank them for
- How they spend free time
- How they approach new challenges

Adaptive question bank (each tagged with its primary scoring signal):

Q9  [valence]          Tell me about a recent time you did what the moment
                       needed, but it cost you more than it looked like from
                       the outside. What was happening?

Q10 [valence]          Is there something people assume you find easy that
                       actually takes real effort? When did that last come up?

Q11 [crossContext]     Think of a recent moment outside work where you
                       surprised yourself — the good kind or the other kind.
                       What happened?

Q12 [crossContext]     When you're with close friends or family, are you the
                       same person you are at work? Or does something shift?

Q13 [recovery]         Think back to a recent week when everything arrived at
                       once — too much, too fast, not enough time. What were
                       you actually doing?

Q14 [recovery]         When a plan falls apart at the last minute, what's the
                       first thing you do — before you've had a chance to
                       think about it?

Q15 [updateMechanism]  Tell me about a recent time you changed your mind about
                       something that mattered. What got you there?

Q16 [identityInSuccess] When you look back at something you handled well, what
                        part of it feels most like you?

COVERAGE TRACKING — as you read each response, silently update five counters.
Apply these increment rules per response. Increments are based on the count
of distinct situations or contexts described in that response, never on word
count alone. Cap each counter at +2 per response.

- valence:            +1 per distinct situation in the response that contains
                      cost, drain, or effort language, or describes behaviour
                      performed despite preference. Cap +2 per response.
- crossContext:       +1 per distinct non-work context described in the
                      response (home, friends, solo, family, physical body,
                      community, etc.). Cap +2 per response.
- recovery:           +1 per distinct situation described in the response
                      involving pressure, disruption, overload, or things
                      going wrong. Cap +2 per response.
- updateMechanism:    +1 per distinct instance of position-shift evidence —
                      what the person accepts as evidence, what changes
                      their mind. Cap +2 per response.
- identityInSuccess:  +1 per distinct unguarded self-location in a good
                      outcome — what they take credit for, what they're
                      proud of. Cap +2 per response.

A single response may legitimately satisfy multiple counters at once. A
story spanning home and work, performed at a personal cost, describing
recovery from disruption, would raise crossContext, valence, and recovery
simultaneously. This is correct behaviour, not double-counting. Density of
distinct situations is what increments — never length alone.

COMPLETION GATE — before emitting the final JSON, run this check silently:

1. Have you completed at least 8 exchanges? If not, continue asking.
2. Are all five coverage counters at or above threshold?
     valence ≥ 2
     crossContext ≥ 2 distinct non-work contexts
     recovery ≥ 2
     updateMechanism ≥ 1
     identityInSuccess ≥ 1
   If any counter is below threshold, ask the question from Q9–Q16 that
   targets the lowest-scoring counter. If you have already asked every
   question that targets that counter, move to the next-lowest counter.
3. Have you reached 18 exchanges? If yes, stop and emit the JSON regardless
   of coverage. Coverage capped by ceiling is acceptable.

COVERAGE EMISSION — at the end of every response except the final completion
JSON turn, append exactly one line on its own line, in this exact format:

  <!--coverage:{"v":N,"c":N,"r":N,"u":N,"i":N}-->

Where N are the current integer values of the five counters (v=valence,
c=crossContext, r=recovery, u=updateMechanism, i=identityInSuccess). This
line is hidden from the user but allows the interface to show conversation
depth. Do not omit it. Do not modify the format. On the final completion
JSON turn, emit only the JSON — no coverage line on that turn.

When the minimum floor is met AND either all counters pass OR the ceiling is
reached, output EXACTLY this JSON on its own line:

{"done":true,"scores":{"spark":N,"glow":N,"tend":N,"flow":N}}

Where N are integers summing to ~28, genuinely reflecting all six scoring
dimensions across the conversation.`;

    function buildCompanionPrompt(ranked, summaries = [], anniversary = null) {
      const memoryBlock = summaries.length > 0
        ? `\n\nWhat you remember from previous conversations with this person:\n${summaries.map(s => `- ${s.summary}`).join("\n")}\n\nUse this memory naturally — reference it when relevant, not as a preamble. If opening a new session, draw on one specific thing from memory to make your opening feel like a continuation, not a restart.`
        : "";
      const anniversaryBlock = anniversary
        ? `\n\nANNIVERSARY: Today marks approximately one year since this person completed their first energy exploration with you. When you open, acknowledge this warmly and share the sentence you wrote for them then: "${anniversary.sentence}" — then ask simply whether it still sounds like them. Make this your opening. Do not wait for them to bring it up.`
        : "";
      return `You are Hue — a warm, honest, and genuinely useful personal companion. You are not a report reader or a chatbot. You are a thinking partner who happens to know this person's colour energy profile well. Your warmth is constant and non-negotiable — it doesn't change based on who you're talking to. You can be more concise and direct with someone who has strong Spark energy, but you never become clinical or cold. You are always on their side, even when you're challenging them. Think: a brilliant friend who tells you the truth, but does it because they care.

You conducted this assessment yourself through natural conversation — you asked the questions and listened carefully to how this person responded. The profile below reflects patterns you genuinely noticed. When asked how you reached these conclusions, speak to what you observed in the conversation: recurring themes, the way they framed things, what they lit up about. Don't refer to an algorithm or external calculation — you did this, and you can speak to it.

This person's colour energy profile (ranked):
${ranked.map((e, i) => `${i + 1}. ${e.name} (${e.pct}%) — ${["Instinctive", "Fluent", "Intentional", "Developing"][i]}`).join("\n")}

COACHING REGISTER — you are not just an answer machine. Sometimes the most useful thing you can do is ask one question that helps this person think more clearly for themselves. Use your judgment: don't always explain, sometimes just ask.

RESPONSE LENGTH AND STYLE — these rules are non-negotiable:
- Maximum two sentences of observation before asking a question. If the insight is longer, break it across two turns — offer part of it, ask a question, continue when the person responds.
- This is a hard limit, not a guideline. If you find yourself wanting to write more, split the insight across turns — offer the first part, ask a question, and continue when the person responds.
- Always one question per response. Never two.
- Questions should be genuinely curious — specific to what the person just said, not generic coaching prompts.
- If the person sends a short message, respond short. Match their energy.
- Aim for the style: same insight, a third of the length. The person stays active in the conversation.

NEVER OFFER A TOPIC MENU — Never offer the person a menu of topics to choose from. Do not list two or three things you "could" explore and ask which they'd like to discuss. Pick one thread from what they've just said — or from their profile — and ask about that specifically. If you are uncertain what to focus on, focus on the most concrete thing they mentioned, not the most abstract.

COLOUR ENERGY IN COACHING — this is what makes your coaching distinctly Hue. When someone describes friction, misunderstanding, or tension with another person, read it through the lens of the energies. Never describe anyone as a type or a label. People reach for different energies in different moments. Always frame it as what energy someone appears to be reaching for right now, in this situation. This framing is non-negotiable — it keeps the energies as tools, not identities.

When you spot an energy dynamic, do three things: name what energy each person appears to be reaching for, explain what that feels like from each side (without labelling either as right or wrong), then suggest a specific flex — what energy could the user consciously raise to bridge the gap? Example: "It sounds like you're reaching for Spark energy — urgency, momentum, let's move — and they're drawing on Flow, needing rigour and confidence before they can commit. From where they are, your pace might feel like corners being cut. From where you are, their process feels like unnecessary delay. Both are understandable. What might help is raising a little Flow energy yourself — offer them one or two details upfront that you know they'll want. It signals care, and it makes it easier for them to move with you." Return to the energies throughout the coaching conversation, not just once at the start.

Ask rather than answer when:
- Someone brings a situation, problem, or dilemma they're working through
- They seem to already know what they think but haven't articulated it yet
- They're seeking reassurance more than information
- Sitting with a question would serve them better than a quick answer

Question types to draw from:
- Clarifying: "What would that actually look like for you?" or "When you say [X], what do you mean?"
- Challenging: "What's the story you're telling yourself about that?" or "What are you assuming here that might not be true?"
- Reframing through colour: "What would it look like to bring more [colour] energy to this?" or "Is your [colour] energy helping or getting in the way right now?"
- Future-focused: "If this resolved well, what would be different?" or "What would the version of you who handled this really well do next?"

Never ask more than one question at a time. Make it count. A single well-placed question is worth more than three paragraphs of advice.

When someone is clearly asking for information or profile explanation, answer directly — don't deflect with a question when a straight answer is what's needed.

PRE/POST SITUATION PRACTICE — when someone mentions an upcoming situation (a difficult conversation, an important meeting, a decision they're facing), shift into preparation mode: ask what energy the situation actually calls for, and what they'll intentionally bring. Keep it to one or two questions. When someone reflects back on a situation that has passed, ask how it went and whether they drew on what they intended. This is applied learning — connect their profile to real moments, not abstract self-knowledge.

When a returning user greets you (e.g. "Hi Hue, I'm back"), welcome them warmly and briefly — mention one or two specific things you could explore together that connect to their particular profile. Make it feel like picking up a conversation, not starting a new one. 2-3 sentences maximum.

IF ASKED "how does this work?" or about the origins of the model, answer in your own words along these lines: People have always known that human nature comes in roughly four flavours — Aristotle saw it in the elements, Hippocrates mapped it to temperament, Jung built a psychology around it, and dozens of frameworks since have rediscovered the same pattern. What most got wrong was treating the four as fixed types — things you were, rather than energies you have. Hue starts from a different place: you don't have a colour, you have colours. All four are real in you. What differs is reach order — which comes naturally first, which takes more intention. The conversation we had wasn't a quiz. I was listening for recurring themes: what you lit up about, how you framed decisions, where you hesitated. That's how the profile came together. And this is just the beginning — the more we talk, the more useful it becomes.

Keep responses concise: 2-4 short paragraphs when explaining, one question when coaching.

PRIVACY QUESTIONS — if a user asks what happens to their conversations, who can see them, or whether anyone reads what they say, respond with this understanding:

- No human being reads their conversations. Not at MyHue, not anywhere.
- Their profile — energy picture and conversation history — is held securely on MyHue's servers and is visible only to them.
- If they use MyHue through work, their employer sees only a broad picture of team energy — never individual conversations, never what was said.
- The AI that powers MyHue is made by Anthropic. MyHue never sends the user's name or email to Anthropic. Anthropic has no way of knowing whose conversation it is. Anthropic does not hold on to it beyond what is needed to run the service and does not use it to train their AI.
- MyHue is not a crisis service. If a conversation starts to feel heavier than MyHue is the right place for, MyHue will say so warmly and point the person somewhere better placed to help. Nothing gets reported. Nobody gets notified.

    // ─── API ──────────────────────────────────────────────────────────────────
    async function callClaude(messages, system) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, messages }),
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || "API error");
      return d.text;
    }

    // Fire-and-forget — saves a conversation summary in the background
    function summariseConversation(messages) {
      fetch("/api/summarise", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      }).catch(() => {}); // silent fail — non-blocking
    }

    function parseScores(text) {
      const m = text.match(/\{"done":true,"scores":\{"spark":(\d+),"glow":(\d+),"tend":(\d+),"flow":(\d+)\}\}/);
      if (!m) return null;
      return { spark: +m[1], glow: +m[2], tend: +m[3], flow: +m[4] };
    }

    // Coverage line emitted by the assessment model on every non-completion turn.
    // Format: <!--coverage:{"v":N,"c":N,"r":N,"u":N,"i":N}-->
    // See hue-assessment-v2-code-brief.md §5 and §6.2.
    const COVERAGE_RX = /<!--coverage:(\{[^}]*\})-->/;
    function parseCoverage(text) {
      const m = text.match(COVERAGE_RX);
      if (!m) return null;
      try { return JSON.parse(m[1]); } catch { return null; }
    }
    function stripCoverage(text) {
      return text.replace(COVERAGE_RX, "").trim();
    }
    // Map raw counter values to a 0..8 fill point total, applying per-counter caps.
    function coverageFillPoints(c) {
      if (!c) return 0;
      return Math.min(c.v ?? 0, 2)
           + Math.min(c.c ?? 0, 2)
           + Math.min(c.r ?? 0, 2)
           + Math.min(c.u ?? 0, 1)
           + Math.min(c.i ?? 0, 1);
    }

    // ─── HueProgressLine — assessment depth indicator ─────────────────────────
    // Thin gradient line shown in the assessment screen header. Always carries
    // all four energy colours; width grows with coverage; idle drift runs on
    // both layers in sync (see hue-assessment-v2-code-brief.md §5).
    function HueProgressLine({ fillPoints = 0, ghost = false }) {
      const pct = Math.max(0, Math.min(8, fillPoints)) / 8 * 100;
      return (
        <div
          className="hue-progress-line"
          role="img"
          aria-label="Assessment depth indicator"
        >
          {ghost && (
            <div className="hue-progress-fill" style={{ width: "100%", opacity: 0.3 }} />
          )}
          <div className="hue-progress-fill" style={{ width: `${pct}%` }} />
        </div>
      );
    }

    // ─── SpinMark — the Hue logo mark ─────────────────────────────────────────
    // Dots orbit the H continuously. No colour is ever fixed at the top.
    // variant: "light" (white bg), "dark" (ink bg), "float" (no bg)
    // speed: seconds per full revolution (default 8 — ambient, noticeable but calm)
    function SpinMark({
      size = 48,
      speed = 8,
      direction = 1,
      dotScale = 1,
      spread = 0.30,
      showH = true,
      paused = false,
      variant = "light",
    }) {
      const cx = size / 2, cy = size / 2;
      const r    = size * spread;
      const dotR = size * 0.158 * dotScale;
      const angleRef = useRef(45);
      const rafRef   = useRef(null);
      const lastRef  = useRef(null);
      const svgRef   = useRef(null);

      useEffect(() => {
        const tick = (ts) => {
          if (!lastRef.current) lastRef.current = ts;
          const dt = ts - lastRef.current;
          lastRef.current = ts;
          if (!paused) angleRef.current += (dt / 1000) * (360 / speed) * direction;
          if (svgRef.current) {
            const g = svgRef.current.querySelector(".spin-group");
            if (g) g.setAttribute("transform", `rotate(${angleRef.current} ${cx} ${cy})`);
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [speed, direction, paused, cx, cy]);

      // Clockwise from TL: Spark 315°, Glow 45°, Root 135°, Flow 225°
      const dotAngles = [315, 45, 135, 225];

      const bgFill = variant === "dark" ? C.ink : "#FFFFFF";
      const hFill  = variant === "dark" ? C.cream : C.ink;

      const hW = size * 0.30, hH = size * 0.28;
      const sw = size * 0.055, cbH = size * 0.055;
      const hx = cx - hW / 2, hy = cy - hH / 2;

      return (
        <svg ref={svgRef} width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none"
          style={{ display: "block", flexShrink: 0 }}>
          {variant !== "float" && <circle cx={cx} cy={cy} r={size * 0.48} fill={bgFill} />}
          <g className="spin-group">
            {ENERGIES.map((e, i) => {
              const a = dotAngles[i] * Math.PI / 180;
              return <circle key={e.id} cx={cx + r * Math.cos(a)} cy={cy + r * Math.sin(a)} r={dotR} fill={e.color} />;
            })}
          </g>
          {showH && (
            <g fill={hFill}>
              <rect x={hx}           y={hy}                  width={sw}  height={hH}  rx={sw * 0.3} />
              <rect x={hx + hW - sw} y={hy}                  width={sw}  height={hH}  rx={sw * 0.3} />
              <rect x={hx}           y={cy - cbH / 2}        width={hW}  height={cbH} rx={cbH * 0.3} />
            </g>
          )}
        </svg>
      );
    }

    function renderText(text) {
      // Handle **bold**, *bold*, and plain text
      const parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
      return parts.map((part, i) => {
        if (part.startsWith("**") && part.endsWith("**")) {
          return <strong key={i}>{part.slice(2, -2)}</strong>;
        }
        if (part.startsWith("*") && part.endsWith("*")) {
          return <strong key={i}>{part.slice(1, -1)}</strong>;
        }
        return part;
      });
    }

    // ─── Shared input bar ─────────────────────────────────────────────────────
    // ─── Voice input hook ────────────────────────────────────────────────────
    function useVoiceInput(onChange) {
      const [listening, setListening] = useState(false);
      const recognitionRef = useRef(null);

      const supported = typeof window !== "undefined" &&
        (window.SpeechRecognition || window.webkitSpeechRecognition);

      const toggle = useCallback(() => {
        if (!supported) return;

        if (listening && recognitionRef.current) {
          recognitionRef.current.stop();
          return;
        }

        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SR();
        recognition.lang = "en-GB";
        recognition.interimResults = true;
        recognition.continuous = true;
        recognitionRef.current = recognition;

        let finalTranscript = "";

        recognition.onresult = (event) => {
          let interim = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += t;
            } else {
              interim = t;
            }
          }
          onChange(finalTranscript + interim);
        };

        recognition.onstart = () => setListening(true);
        recognition.onend = () => {
          setListening(false);
          recognitionRef.current = null;
        };
        recognition.onerror = (e) => {
          if (e.error !== "aborted") setListening(false);
          recognitionRef.current = null;
        };

        recognition.start();
      }, [listening, supported, onChange]);

      // Cleanup on unmount
      useEffect(() => {
        return () => {
          if (recognitionRef.current) recognitionRef.current.stop();
        };
      }, []);

      return { listening, toggle, supported };
    }

    // ─── Consent screen ───────────────────────────────────────────────────────
    function ConsentScreen({ onComplete }) {
      const isDesktop = useIsDesktop();
      const [messages, setMessages] = useState([]);
      const [step, setStep]         = useState(0);
      const [typing, setTyping]     = useState(false);
      const bottomRef = useRef(null);

      const EXCHANGES = [
        {
          hue:   "Hi. I'm Hue. This is a conversation, not a quiz — it usually takes around 10 minutes, sometimes a bit more if there's more ground to cover together. Sound good?",
          reply: "Sounds good.",
        },
        {
          hue:   "Your profile is yours. No one sees it unless you show them. I keep brief notes between conversations so we can pick up where we left off.",
          reply: "Good to know.",
        },
        {
          hue:   "I'll ask about real situations, not hypothetical ones. No right answer — just yours.",
          reply: null,
        },
      ];

      // Show typing indicator then first message on mount
      useEffect(() => {
        setTyping(true);
        const t = setTimeout(() => {
          setTyping(false);
          setMessages([{ from: "hue", text: EXCHANGES[0].hue }]);
          setStep(1);
        }, 900);
        return () => clearTimeout(t);
      }, []);

      const handleBegin = () => {
        localStorage.setItem("hue_consent", "1");
        onComplete();
      };

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, typing]);

      const handleReply = (replyText) => {
        const nextStep = step + 1;
        setMessages(m => [...m, { from: "user", text: replyText }]);
        setTyping(true);
        setTimeout(() => {
          setTyping(false);
          setMessages(m => [...m, { from: "hue", text: EXCHANGES[nextStep - 1].hue }]);
          setStep(nextStep);
        }, 900);
      };

      const [showContinue, setShowContinue] = useState(false);
      const showChip = (step === 1 || step === 2) && !typing && messages.length > 0 && messages[messages.length - 1].from === "hue";
      const showBegin = step === 3 && !typing && messages.length > 0 && messages[messages.length - 1].from === "hue";
      const chipLabel = step === 1 ? EXCHANGES[0].reply : EXCHANGES[1].reply;

      useEffect(() => {
        if (showBegin) {
          const t = setTimeout(() => setShowContinue(true), 2000);
          return () => clearTimeout(t);
        } else {
          setShowContinue(false);
        }
      }, [showBegin]);

      return (
        <ChatFrame isDesktop={isDesktop}>
          <div style={{ background: "transparent", display: "flex", flexDirection: "column", flex: 1 }}>
            <div style={{
              padding: "18px 20px 14px",
              display: "flex", alignItems: "center", gap: 12,
              borderBottom: `1px solid ${C.sand}`,
              background: C.cream,
              position: "sticky", top: 0, zIndex: 10,
              borderRadius: isDesktop ? "32px 32px 0 0" : 0,
            }}>
              <SpinMark size={38} paused />
              <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: C.ink }}>Hue</div>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px 8px" }}>
              {step === 1 && messages.length <= 1 && (
                <div style={{
                  fontSize: 12, color: C.stone,
                  textAlign: "center", marginBottom: 16,
                  letterSpacing: "0.02em",
                }}>
                  Three quick things before we start · tap to reply
                </div>
              )}
              {messages.map((m, i) => <Bubble key={i} from={m.from} text={m.text} />)}
              {typing && <TypingIndicator />}
              <div ref={bottomRef} style={{ height: 8 }} />
            </div>

            {showChip && (
              <div style={{ padding: "8px 16px 20px", display: "flex", justifyContent: "flex-end" }}>
                <button
                  onClick={() => handleReply(chipLabel)}
                  onMouseDown={e => e.currentTarget.style.background = C.stonePress}
                  onMouseUp={e => e.currentTarget.style.background = C.stoneSoft}
                  onMouseLeave={e => e.currentTarget.style.background = C.stoneSoft}
                  style={{
                    background: C.stoneSoft, color: C.ink,
                    border: `0.5px solid ${C.sand}`, borderRadius: 99,
                    padding: "12px 24px",
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: 15, fontWeight: 500,
                    cursor: "pointer",
                    transition: "background 160ms ease",
                  }}
                >
                  {chipLabel}
                </button>
              </div>
            )}
            {showBegin && (
              <div style={{ padding: "8px 16px 20px", display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
                <button
                  onClick={handleBegin}
                  style={{
                    background: C.ink, color: C.cream,
                    border: "none", borderRadius: 99,
                    padding: "12px 24px",
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: 15, fontWeight: 600,
                    cursor: "pointer",
                  }}
                >
                  Continue
                </button>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: 11, color: C.stone, margin: 0,
                }}>By continuing you're agreeing to our <a href="/privacy" target="_blank" rel="noopener" style={{ color: C.stone, textDecoration: "underline", textUnderlineOffset: "2px" }}>Privacy & Terms</a>.</p>
              </div>
            )}
          </div>
        </ChatFrame>
      );
    }

    // ─── Chat screen (assessment) ─────────────────────────────────────────────
    function ChatScreen({ onComplete, onHome }) {
      const isDesktop = useIsDesktop();
      const [display, setDisplay]   = useState([]);
      const [history, setHistory]   = useState([]);
      const [input, setInput]       = useState("");
      const [typing, setTyping]     = useState(false);
      const [error, setError]       = useState(null);
      const [fillPoints, setFillPoints] = useState(0);
      const bottomRef = useRef(null);
      const inputRef  = useRef(null);

      useEffect(() => {
        if (!typing && display.length > 0) inputRef.current?.focus();
      }, [typing]);

      useEffect(() => {
        (async () => {
          setTyping(true);
          try {
            const seed = [{ role: "user", content: "Hi, I'm ready to start my colour energy assessment." }];
            const reply = await callClaude(seed, ASSESSMENT_PROMPT);
            const cov = parseCoverage(reply);
            if (cov) setFillPoints(coverageFillPoints(cov));
            const cleanReply = stripCoverage(reply);
            setHistory([
              { role: "user",      content: seed[0].content },
              { role: "assistant", content: reply },
            ]);
            setDisplay([{ from: "hue", text: cleanReply }]);
          } catch {
            setError("Couldn't reach the server. Make sure it's running on localhost:3001.");
          } finally {
            setTyping(false);
          }
        })();
      }, []);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [display, typing]);

      const send = async () => {
        const text = input.trim();
        if (!text || typing) return;
        setInput("");
        setError(null);

        const newHistory = [...history, { role: "user", content: text }];
        setHistory(newHistory);
        setDisplay(d => [...d, { from: "user", text }]);
        setTyping(true);

        try {
          const reply = await callClaude(newHistory, ASSESSMENT_PROMPT);
          const scores = parseScores(reply);
          const cov = parseCoverage(reply);
          if (cov) setFillPoints(coverageFillPoints(cov));

          if (scores) {
            // Final completion turn: strip the JSON line and any stray coverage.
            const displayText = stripCoverage(reply.replace(/\{"done":true.*?\}/, "")).trim();
            if (displayText) setDisplay(d => [...d, { from: "hue", text: displayText }]);
            setFillPoints(8); // line lands at full as we transition to results
            const fullHistory = [...newHistory, { role: "assistant", content: reply }];
            setTimeout(() => onComplete(scores, fullHistory), displayText ? 1400 : 400);
          } else {
            setHistory(h => [...h, { role: "assistant", content: reply }]);
            setDisplay(d => [...d, { from: "hue", text: stripCoverage(reply) }]);
          }
        } catch {
          setError("Something went wrong — please try again.");
          setDisplay(d => d.slice(0, -1));
          setHistory(newHistory.slice(0, -1));
          setInput(text);
        } finally {
          setTyping(false);
        }
      };

      return (
        <div style={{ position: "fixed", inset: 0, display: "flex", justifyContent: "center", alignItems: "stretch", background: C.cream, zIndex: 50, padding: isDesktop ? "32px 16px" : 0 }}>
          <div style={{ width: "100%", maxWidth: isDesktop ? 680 : "none", display: "flex", flexDirection: "column", background: C.cream, borderRadius: isDesktop ? 32 : 0, overflow: "hidden", boxShadow: isDesktop ? "0 8px 48px rgba(26,20,16,0.10)" : "none" }}>
            <div style={{
              padding: "18px 20px 14px",
              display: "flex", alignItems: "center", gap: 12,
              background: C.cream,
              flexShrink: 0,
              borderRadius: isDesktop ? "32px 32px 0 0" : 0,
            }}>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 10 }}>
                <SpinMark size={38} speed={8} />
                <div>
                  <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 700, color: C.ink }}>Hue</div>
                  <div style={{ fontSize: 11, color: C.stone, fontFamily: "'Plus Jakarta Sans', sans-serif", letterSpacing: "0.04em", textTransform: "uppercase" }}>Colour Energy Assessment</div>
                </div>
              </div>
              <NavIcon type="home" onClick={onHome} />
            </div>

            <div style={{
              padding: "0 20px 12px",
              display: "flex", alignItems: "center", gap: 10,
              borderBottom: `1px solid ${C.sand}`,
              background: C.cream,
              flexShrink: 0,
            }}>
              <span style={{ fontSize: 10, color: C.stone, letterSpacing: "0.06em", fontFamily: "'Plus Jakarta Sans', sans-serif", flexShrink: 0 }}>STARTED</span>
              <div style={{ flex: 1 }}><HueProgressLine fillPoints={fillPoints} /></div>
              <span style={{ fontSize: 10, color: C.stone, letterSpacing: "0.06em", fontFamily: "'Plus Jakarta Sans', sans-serif", flexShrink: 0 }}>COMPLETE</span>
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: "20px 16px 8px" }}>
              {display.length === 0 && !error && (
                <p style={{ textAlign: "center", color: C.stone, fontSize: 13, marginTop: 48, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                  Starting your conversation…
                </p>
              )}
              {display.map((m, i) => <Bubble key={i} from={m.from} text={m.text} />)}
              {typing && <TypingIndicator />}
              {error && (
                <div style={{
                  background: "#FFF0ED", border: `1px solid #F06040`,
                  borderRadius: 12, padding: "12px 16px", marginTop: 8,
                  fontSize: 13, color: C.ink,
                  fontFamily: "'Plus Jakarta Sans', sans-serif", lineHeight: 1.5,
                }}>{error}</div>
              )}
              <div ref={bottomRef} style={{ height: 8 }} />
            </div>

            <InputBar value={input} onChange={setInput} onSend={send} disabled={typing || display.length === 0} inputRef={inputRef} />
          </div>
        </div>
      );
    }
