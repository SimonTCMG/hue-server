    // ─── App ──────────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState("welcome");
      const [scores, setScores] = useState(null);
      const [ranked, setRanked] = useState(null);
      const [savedProfile, setSavedProfile] = useState(() => loadProfile());

      // Beta session — null until /api/me resolves
      const [betaUser,    setBetaUser]    = useState(null);
      const [betaChecked, setBetaChecked] = useState(false);

      // Check for existing session and/or invite token on mount
      useEffect(() => {
        (async () => {
          try {
            const res  = await fetch("/api/me");
            const data = await res.json();
            if (data.user) {
              setBetaUser(data.user);
              // If server has a completed assessment but this device has no localStorage profile,
              // hydrate savedProfile from server so returning user view shows on any device
              if (data.user.assessmentCompleted && data.user.scores && data.user.labels && !loadProfile()) {
                const labelOrder = { "Instinctive": 0, "Fluent": 1, "Intentional": 2, "Developing": 3 };
                const rankedIds = Object.entries(data.user.labels)
                  .sort(([, a], [, b]) => labelOrder[a] - labelOrder[b])
                  .map(([id]) => id);
                saveProfile(data.user.scores, rankedIds.map(id => ({ id })), data.user.assessmentCompletedAt);
                setSavedProfile(loadProfile());
              }
            }
          } catch {}
          finally { setBetaChecked(true); }
        })();
      }, []);

      // Shared profile path — /shared/:token
      const sharedPathMatch = window.location.pathname.match(/^\/shared\/([^/]+)$/);
      const sharedToken = sharedPathMatch ? sharedPathMatch[1] : null;

      // Shared team path — /shared-team/:token
      const sharedTeamPathMatch = window.location.pathname.match(/^\/shared-team\/([^/]+)$/);
      const sharedTeamToken = sharedTeamPathMatch ? sharedTeamPathMatch[1] : null;

      // Org member registration path — /register-org
      const isOrgRegister = window.location.pathname === "/register-org";

      // Admin register path — /admin-register (Simon only)
      const isAdminRegister = window.location.pathname === "/admin-register";

      // Team dashboard path — /team/:teamId
      const teamPathMatch = window.location.pathname.match(/^\/team\/([^/]+)$/);
      const teamPathId = teamPathMatch ? teamPathMatch[1] : null;

      // Org admin path — /org/:orgId
      const orgPathMatch = window.location.pathname.match(/^\/org\/([^/]+)$/);
      const orgPathId = orgPathMatch ? orgPathMatch[1] : null;

      // Team list state (for welcome screen team nav)
      const [userTeams, setUserTeams] = useState([]);
      useEffect(() => {
        if (betaUser) {
          fetch("/api/teams").then(r => r.json()).then(d => {
            if (d.teams) setUserTeams(d.teams);
          }).catch(() => {});
        }
      }, [betaUser]);

      // Checkout return params
      const urlParams = new URLSearchParams(window.location.search);
      const checkoutResult = urlParams.get("checkout"); // "success" | "cancelled"
      const showSubscribe   = urlParams.get("subscribe") === "1";

      // Clean checkout params from URL without reload
      useEffect(() => {
        if (checkoutResult || showSubscribe) {
          window.history.replaceState({}, "", "/");
        }
      }, []);

      // Lock body scroll when chat screens are active (keeps header pinned)
      useEffect(() => {
        const isChatScreen = screen === "chat" || screen === "companion";
        document.body.style.overflow = isChatScreen ? "hidden" : "";
        document.body.style.height = isChatScreen ? "100vh" : "";
        return () => { document.body.style.overflow = ""; document.body.style.height = ""; };
      }, [screen]);

      // Hook browser back button into app navigation
      useEffect(() => {
        window.history.replaceState({ screen: "welcome" }, "");
        const handlePop = (e) => {
          const s = e.state?.screen || "welcome";
          // Only navigate back to results if scores are still in memory
          if (s === "results" && !scores) setScreen("welcome");
          else if (s === "sentence" && !ranked) setScreen("welcome");
          else if (s === "companion" && !ranked) setScreen("welcome");
          else setScreen(s);
        };
        window.addEventListener("popstate", handlePop);
        return () => window.removeEventListener("popstate", handlePop);
      }, [scores, ranked]);

      const navigate = (newScreen) => {
        if (newScreen === "welcome") setSavedProfile(loadProfile());
        window.history.pushState({ screen: newScreen }, "");
        setScreen(newScreen);
      };

      const handleLogin = (user) => {
        setBetaUser(user);
        if (user.assessmentCompleted && user.scores && user.labels) {
          const labelOrder = { "Instinctive": 0, "Fluent": 1, "Intentional": 2, "Developing": 3 };
          const rankedIds = Object.entries(user.labels)
            .sort(([, a], [, b]) => labelOrder[a] - labelOrder[b])
            .map(([id]) => id);
          saveProfile(user.scores, rankedIds.map(id => ({ id })), user.assessmentCompletedAt);
          setSavedProfile(loadProfile());
        }
        navigate("welcome");
      };

      const restoreSaved = () => {
        const restoredRanked = profileToRanked(savedProfile);
        setScores(savedProfile.scores);
        setRanked(restoredRanked);
        return restoredRanked;
      };

      const [returningToChat, setReturningToChat] = useState(false);
      const [bespokeObs,  setBespokeObs]  = useState(undefined); // undefined = not expected; null = loading; string = ready
      const [oneSentence, setOneSentence] = useState(undefined); // same pattern

      // onChat(true) → view results first; onChat() → go straight to companion
      const handleChat = (viewResults = false) => {
        const restoredRanked = restoreSaved();
        if (viewResults) {
          navigate("results");
        } else {
          setRanked(restoredRanked);
          setReturningToChat(true);
          navigate("companion");
        }
      };

      // All non-logged-in users see the registration screen. Wait for /api/me first.
      const showRegister = betaChecked && !betaUser;

      // SIMON: This is where free-tier restriction would be enforced in future.
      // When the free tier is limited to dominant energy only, non-beta users
      // would get a restricted assessment. For now the public app is unchanged.
      const isBeta = !!betaUser;

      const handleAssessmentComplete = async (s, conversationHistory) => {
        setScores(s);
        setBespokeObs(null);   // null = loading
        setOneSentence(null);  // null = loading
        navigate("results");

        if (conversationHistory?.length > 0) {
          const payload = { messages: conversationHistory, scores: s };
          // Bespoke observation (fire and forget)
          fetch("/api/bespoke-observation", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })
            .then(r => r.json())
            .then(d => setBespokeObs(d.observation || undefined))
            .catch(() => setBespokeObs(undefined));
          // One sentence (fire and forget — parallel)
          fetch("/api/one-sentence", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })
            .then(r => r.json())
            .then(d => setOneSentence(d.sentence || undefined))
            .catch(() => setOneSentence(undefined));
        }

        if (isBeta) {
          const total     = Object.values(s).reduce((a, b) => a + b, 0);
          const rankedIds = [...Object.entries(s)]
            .sort(([, a], [, b]) => b - a)
            .map(([id]) => id);
          const labelNames = ["Instinctive", "Fluent", "Intentional", "Developing"];
          const labels     = Object.fromEntries(rankedIds.map((id, i) => [id, labelNames[i]]));
          fetch("/api/complete", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ scores: s, labels, dominantEnergy: rankedIds[0] }),
          }).catch(() => {});
        }
      };

      return (
        <>
          <style>{`
            input::placeholder { color: ${C.stone}; }
            input:focus { border-color: ${C.ink} !important; outline: none; }
          `}</style>
          {isAdminRegister && betaUser?.email === "simon@thechangemakergroup.com" ? (
            <AdminRegisterScreen onBack={() => { window.history.replaceState({}, "", "/"); window.location.reload(); }} />
          ) : teamPathId && betaUser ? (
            <TeamDashboardScreen
              teamId={teamPathId}
              currentUserId={betaUser.id}
              onBack={() => { window.history.replaceState({}, "", "/"); setScreen("welcome"); window.location.reload(); }}
            />
          ) : orgPathId && betaUser ? (
            <OrgAdminScreen
              orgId={orgPathId}
              onBack={() => { window.history.replaceState({}, "", "/"); setScreen("welcome"); window.location.reload(); }}
            />
          ) : sharedTeamToken ? (
            <SharedTeamScreen token={sharedTeamToken} />
          ) : sharedToken ? (
            <SharedProfileScreen token={sharedToken} />
          ) : betaChecked && betaUser?.userState === "individual-trial-expired" ? (
            <TrialExpiredScreen userName={betaUser.name} />
          ) : showRegister && isOrgRegister ? (
            screen === "sign-in"
              ? <LoginScreen onLogin={handleLogin} onBack={() => setScreen("register")} />
              : <OrgRegisterScreen
                  onRegistered={user => { setBetaUser(user); window.history.replaceState({}, "", "/"); navigate("welcome"); }}
                  onSignIn={() => setScreen("sign-in")}
                />
          ) : showRegister ? (
            screen === "sign-in"
              ? <LoginScreen onLogin={handleLogin} onBack={() => setScreen("register")} />
              : <RegisterScreen
                  onRegistered={user => { setBetaUser(user); navigate("welcome"); }}
                  onSignIn={() => setScreen("sign-in")}
                />
          ) : (
            <>
              {screen === "welcome" && (
                <WelcomeScreen
                  onStart={() => {
                    if (localStorage.getItem("hue_consent")) navigate("chat");
                    else navigate("consent");
                  }}
                  onChat={handleChat}
                  savedProfile={savedProfile}
                  onSignIn={() => navigate("sign-in")}
                  onSettings={() => navigate("settings")}
                  teams={userTeams}
                  user={betaUser}
                />
              )}
              {/* SHARED FOOTER v1 — signed-out visitors only on Welcome screen.
                  Keep in sync across about.html, privacy.html, manifesto.html, and hue.html Welcome screen */}
              {screen === "welcome" && !betaUser && <SharedFooter />}
              {screen === "consent" && (
                <ConsentScreen onComplete={() => navigate("chat")} />
              )}
              {screen === "chat" && (
                <ChatScreen
                  onComplete={handleAssessmentComplete}
                  onHome={() => navigate("welcome")}
                />
              )}
              {screen === "results" && scores && (
                <ResultsScreen
                  scores={scores}
                  bespokeObs={bespokeObs}
                  onContinue={r => {
                    setRanked(r);
                    setReturningToChat(false);
                    // Skip sentence screen for returning users viewing old results (oneSentence never loaded)
                    navigate(oneSentence === undefined ? "companion" : "sentence");
                  }}
                  onHome={() => navigate("welcome")}
                />
              )}
              {screen === "sentence" && ranked && (
                <OneSentenceScreen
                  sentence={oneSentence}
                  primary={ranked[0]}
                  onContinue={() => navigate("companion")}
                />
              )}
              {screen === "companion" && ranked && (
                <CompanionScreen ranked={ranked} onHome={() => navigate("welcome")} returning={returningToChat} />
              )}
              {screen === "settings" && (
                <AccountSettingsScreen
                  user={betaUser}
                  onBack={() => navigate("welcome")}
                  onEmailChanged={() => window.location.reload()}
                />
              )}
            </>
          )}
          {/* Persistent footer — Privacy & Terms link, visible on all non-fullscreen screens */}
          {screen !== "chat" && screen !== "companion" && screen !== "consent" && (
            <div style={{
              textAlign: "center",
              padding: "16px 24px 24px",
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              fontSize: 11,
            }}>
              <a href="/privacy" style={{ color: C.stone, textDecoration: "none", borderBottom: `1px solid ${C.sand}`, paddingBottom: 1 }}>Privacy & Terms</a>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
