<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHue - Four energies. Infinite versions of you.</title>
  <meta name="description" content="A conversation that figures out how you naturally show up - then a companion who helps you use that, every single day." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #FDFAF4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1A1410;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }
    #root {
      min-height: 100vh;
      width: 100%;
    }

    /* Fix 1: Scroll indicator bounce */
    @keyframes scrollBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    /* Fix 3: Typing dots */
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* Fix 7: Scroll-reveal */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Respect prefers-reduced-motion globally */
    @media (prefers-reduced-motion: reduce) {
      .spin-group { animation: none !important; transition: none !important; }
      .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    /* ─── Shared footer (used across about, privacy, manifesto) ─── */
    .shared-footer {
      background: #FDFAF5;
      border-top: 1px solid #EAE4DB;
      padding: 48px 24px;
      text-align: center;
    }
    .shared-footer-inner {
      max-width: 960px;
      margin: 0 auto;
    }
    .shared-footer-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
    }
    .shared-footer-nav a {
      color: #73685A;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .shared-footer-nav a:hover {
      color: #1A1410;
      text-decoration: underline;
    }
    .shared-footer-nav .current {
      color: #1A1410;
      font-weight: 600;
    }
    .shared-footer-nav .dot {
      color: #C8BFB2;
      user-select: none;
    }
    .shared-footer-small {
      margin-top: 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      color: #9A8F86;
    }
    @media (max-width: 640px) {
      .shared-footer-nav {
        flex-direction: column;
        gap: 16px;
      }
      .shared-footer-nav .dot {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const C = {
      cream: "#FDFAF4", ink: "#1A1410", sand: "#E8DFC8", stone: "#73685A",
      spark: "#D92010", sparkLight: "#FFF0ED",
      glow:  "#F5D000", glowLight:  "#FEFCE8", glowOnLight: "#C8960C",
      tend:  "#1A8C4E", tendLight:  "#E8F7EF",
      flow:  "#1755B8", flowLight:  "#E8F0FC",
    };

    const ENERGIES = [
      { id: "spark", color: C.spark, light: C.sparkLight },
      { id: "glow",  color: C.glow,  light: C.glowLight },
      { id: "tend",  color: C.tend,  light: C.tendLight },
      { id: "flow",  color: C.flow,  light: C.flowLight },
    ];

    // ─── Reduced-motion hook ──────────────────────────────────────────────────
    function useReducedMotion() {
      const [reduced, setReduced] = useState(false);
      useEffect(() => {
        const mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        setReduced(mq.matches);
        const h = (e) => setReduced(e.matches);
        mq.addEventListener("change", h);
        return () => mq.removeEventListener("change", h);
      }, []);
      return reduced;
    }

    // ─── Scroll-reveal hook (Fix 7) ───────────────────────────────────────────
    function useReveal(opts = {}) {
      const ref = useRef(null);
      const reducedMotion = useReducedMotion();
      useEffect(() => {
        if (reducedMotion || !ref.current) return;
        const el = ref.current;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            const delay = opts.delay || 0;
            setTimeout(() => el.classList.add("visible"), delay);
            observer.unobserve(el);
          }
        }, { threshold: 0.15 });
        observer.observe(el);
        return () => observer.disconnect();
      }, [reducedMotion]);
      return ref;
    }

    // ─── SpinMark ─────────────────────────────────────────────────────────────
    function SpinMark({ size = 48, speed = 8, direction = 1, dotScale = 1, spread = 0.30, showH = true, paused = false, variant = "light" }) {
      const cx = size / 2, cy = size / 2;
      const r = size * spread;
      const dotR = size * 0.158 * dotScale;
      const angleRef = useRef(45);
      const rafRef = useRef(null);
      const lastRef = useRef(null);
      const svgRef = useRef(null);
      const reducedMotion = useReducedMotion();
      const shouldPause = paused || reducedMotion;

      useEffect(() => {
        const tick = (ts) => {
          if (!lastRef.current) lastRef.current = ts;
          const dt = ts - lastRef.current;
          lastRef.current = ts;
          if (!shouldPause) angleRef.current += (dt / 1000) * (360 / speed) * direction;
          if (svgRef.current) {
            const g = svgRef.current.querySelector(".spin-group");
            if (g) g.setAttribute("transform", `rotate(${angleRef.current} ${cx} ${cy})`);
          }
          rafRef.current = requestAnimationFrame(tick);
        };
        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [speed, direction, shouldPause, cx, cy]);

      const dotAngles = [315, 45, 135, 225];
      const bgFill = variant === "dark" ? C.ink : "#FFFFFF";
      const hFill = variant === "dark" ? C.cream : C.ink;
      const hW = size * 0.30, hH = size * 0.28;
      const sw = size * 0.055, cbH = size * 0.055;
      const hx = cx - hW / 2, hy = cy - hH / 2;

      return (
        <svg ref={svgRef} width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none" style={{ display: "block", flexShrink: 0 }}>
          {variant !== "float" && <circle cx={cx} cy={cy} r={size * 0.48} fill={bgFill} />}
          <g className="spin-group">
            {ENERGIES.map((e, i) => {
              const a = dotAngles[i] * Math.PI / 180;
              return <circle key={e.id} cx={cx + r * Math.cos(a)} cy={cy + r * Math.sin(a)} r={dotR} fill={e.color} />;
            })}
          </g>
          {showH && (
            <g fill={hFill}>
              <rect x={hx} y={hy} width={sw} height={hH} rx={sw * 0.3} />
              <rect x={hx + hW - sw} y={hy} width={sw} height={hH} rx={sw * 0.3} />
              <rect x={hx} y={cy - cbH / 2} width={hW} height={cbH} rx={cbH * 0.3} />
            </g>
          )}
        </svg>
      );
    }

    // ─── EnergyIcon (matching hue.html component) ─────────────────────────────
    function EnergyIcon({ energy, size = 28, noContainer = false, variant = "default" }) {
      const sw = size >= 64 ? 1.8 : size >= 40 ? 2.0 : size >= 28 ? 2.2 : 2.4;
      const e = ENERGIES.find(x => x.id === energy) || ENERGIES[0];
      // On dark backgrounds, use fill colour (not glowOnLight)
      const strokeColor = variant === "onDark" ? e.color : e.color;
      const svgProps = {
        width: size * 0.65, height: size * 0.65,
        viewBox: "0 0 24 24", fill: "none",
        stroke: strokeColor, strokeWidth: sw,
        strokeLinecap: "round", strokeLinejoin: "round",
        style: { display: "block" },
      };

      const iconSvg = energy === "spark" ? (
        React.createElement("svg", svgProps, React.createElement("path", { d: "M13 2L5 13h7l-1 9 9-12h-7z" }))
      ) : energy === "glow" ? (
        React.createElement("svg", svgProps,
          React.createElement("circle", { cx: 12, cy: 12, r: 9 }),
          React.createElement("circle", { cx: 12, cy: 12, r: 4 })
        )
      ) : energy === "tend" ? (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M19 3 C18 6 11 5 8 9 C5 13 4 18 5 21 C6 18 13 19 16 15 C19 11 20 6 19 3 Z" }),
          React.createElement("path", { d: "M19 3 C15 8 10 14 5 21" }),
          React.createElement("line", { x1: 5, y1: 21, x2: 3, y2: 24 })
        )
      ) : (
        React.createElement("svg", svgProps,
          React.createElement("path", { d: "M3 9 C6 6 9 6 12 9 C15 12 18 12 21 9" }),
          React.createElement("path", { d: "M3 15 C6 12 9 12 12 15 C15 18 18 18 21 15" })
        )
      );

      if (noContainer) return iconSvg;

      return (
        <div style={{
          width: size, height: size,
          borderRadius: size * 0.28,
          background: e.light,
          display: "flex", alignItems: "center", justifyContent: "center",
          flexShrink: 0,
        }}>
          {iconSvg}
        </div>
      );
    }

    // ─── Shared styles ──────────────────────────────────────────────────────────
    const ctaStyle = {
      display: "inline-block",
      background: C.spark,
      color: C.cream,
      fontFamily: "'Plus Jakarta Sans', sans-serif",
      fontSize: 16,
      fontWeight: 700,
      padding: "16px 36px",
      borderRadius: 99,
      textDecoration: "none",
      transition: "opacity 0.2s ease",
    };

    // ─── Chat bubble ──────────────────────────────────────────────────────────
    function ChatBubble({ speaker, children, style: extraStyle }) {
      const isHue = speaker === "hue";
      return (
        <div style={{
          display: "flex",
          justifyContent: isHue ? "flex-start" : "flex-end",
          marginBottom: 16,
          ...extraStyle,
        }}>
          <div style={{
            maxWidth: "85%",
            background: isHue ? "#F0EBE1" : "#E4DED3",
            borderRadius: isHue ? "18px 18px 18px 4px" : "18px 18px 4px 18px",
            padding: "16px 20px",
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: "clamp(0.9rem, 1.8vw, 1.02rem)",
            lineHeight: 1.7,
            color: C.ink,
          }}>
            {children}
          </div>
        </div>
      );
    }

    // ─── Typing dots indicator ────────────────────────────────────────────────
    function TypingDots() {
      return (
        <div style={{ display: "flex", gap: 5, padding: "4px 0" }}>
          {[0, 1, 2].map(i => (
            <div key={i} style={{
              width: 7, height: 7, borderRadius: "50%",
              background: C.stone,
              animation: `dotPulse 1.2s ease-in-out ${i * 0.2}s infinite`,
            }} />
          ))}
        </div>
      );
    }

    // ─── Typewriter text component (Fix 3) ────────────────────────────────────
    function TypewriterText({ text, speed = 30, onComplete }) {
      const [displayed, setDisplayed] = useState("");
      const indexRef = useRef(0);
      const reducedMotion = useReducedMotion();

      useEffect(() => {
        if (reducedMotion) {
          setDisplayed(text);
          onComplete && onComplete();
          return;
        }
        indexRef.current = 0;
        setDisplayed("");
        const interval = setInterval(() => {
          indexRef.current++;
          setDisplayed(text.slice(0, indexRef.current));
          if (indexRef.current >= text.length) {
            clearInterval(interval);
            onComplete && onComplete();
          }
        }, speed);
        return () => clearInterval(interval);
      }, [text, speed, reducedMotion]);

      return <span>{displayed}</span>;
    }

    // ─── Animated chat sequence (Fix 3) ───────────────────────────────────────
    function AnimatedChat() {
      const [stage, setStage] = useState(0);
      // 0=waiting, 1=hue1 typing, 2=hue1 done, 3=user fade, 4=typing dots,
      // 5=hue2 typing, 6=hue2 done, 7=supporting copy
      const sectionRef = useRef(null);
      const hasPlayed = useRef(false);
      const reducedMotion = useReducedMotion();

      const hue1 = "You mentioned the meeting didn't go the way you hoped. What did you do when you felt it slipping away from you?";
      const userMsg = "I kind of went quiet. I didn't want to make it worse.";
      const hue2 = "That makes a lot of sense given how you show up. You naturally reach for steadiness when things feel uncertain \u2014 which protects the room, even when it costs you the moment. Want to think about what it might look like to reach a little further next time?";

      useEffect(() => {
        if (hasPlayed.current) return;
        const el = sectionRef.current;
        if (!el) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !hasPlayed.current) {
            hasPlayed.current = true;
            if (reducedMotion) { setStage(7); } else { setStage(1); }
            observer.unobserve(el);
          }
        }, { threshold: 0.3 });
        observer.observe(el);
        return () => observer.disconnect();
      }, [reducedMotion]);

      const advance = useCallback((nextStage, delay) => {
        setTimeout(() => setStage(nextStage), delay);
      }, []);

      return (
        <div ref={sectionRef}>
          {/* Hue bubble 1 */}
          {stage >= 1 && (
            <ChatBubble speaker="hue">
              {stage === 1 ? (
                <TypewriterText text={hue1} speed={25} onComplete={() => advance(2, 100)} />
              ) : hue1}
            </ChatBubble>
          )}

          {/* User bubble — fades in */}
          {stage >= 2 && (
            <div style={{
              opacity: stage >= 3 ? 1 : 0,
              transition: "opacity 0.4s ease",
            }}>
              {stage === 2 && <div style={{ display: "none" }}>{(() => { advance(3, 600); return null; })()}</div>}
              <ChatBubble speaker="you">{userMsg}</ChatBubble>
            </div>
          )}

          {/* Typing indicator then Hue bubble 2 */}
          {stage >= 3 && stage < 5 && (
            <div>
              {stage === 3 && <div style={{ display: "none" }}>{(() => { advance(4, 600); return null; })()}</div>}
              {stage === 4 && (
                <ChatBubble speaker="hue">
                  <TypingDots />
                  <div style={{ display: "none" }}>{(() => { advance(5, 1200); return null; })()}</div>
                </ChatBubble>
              )}
            </div>
          )}

          {stage >= 5 && (
            <ChatBubble speaker="hue">
              {stage === 5 ? (
                <TypewriterText text={hue2} speed={20} onComplete={() => advance(6, 100)} />
              ) : hue2}
            </ChatBubble>
          )}

          {/* Trigger supporting copy */}
          {stage === 6 && <div style={{ display: "none" }}>{(() => { advance(7, 400); return null; })()}</div>}

          {/* Supporting copy */}
          <p style={{
            fontFamily: "'Plus Jakarta Sans', sans-serif",
            fontSize: "clamp(0.95rem, 2vw, 1.1rem)",
            fontWeight: 400,
            fontStyle: "italic",
            lineHeight: 1.7,
            color: C.stone,
            textAlign: "center",
            maxWidth: 520,
            margin: "48px auto 0",
            opacity: stage >= 7 ? 1 : 0,
            transition: "opacity 0.6s ease",
          }}>
            Whatever's on your mind. A conversation coming up. Something that didn't land. Hue helps you think it through — and reach a little further.
          </p>
        </div>
      );
    }

    // ─── About page ───────────────────────────────────────────────────────────
    function AboutPage() {
      const [scrolledPastHero, setScrolledPastHero] = useState(false);
      const reducedMotion = useReducedMotion();

      // Fix 1: Hide scroll indicator once scrolled
      useEffect(() => {
        const onScroll = () => setScrolledPastHero(window.scrollY > 100);
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);

      // Fix 7: Reveal refs
      const wiifimRef0 = useReveal({ delay: 0 });
      const wiifimRef1 = useReveal({ delay: 100 });
      const wiifimRef2 = useReveal({ delay: 200 });
      const wiifimRef3 = useReveal({ delay: 300 });
      const howRef = useReveal();
      const socialRef = useReveal();
      const trialRef = useReveal();

      const wiifimStatements = [
        { energy: "spark", text: "Some conversations just work. Others don't. Hue helps you see why \u2014 and what to do differently next time." },
        { energy: "glow",  text: "Most of us spend years wondering why we click with some people and not others. Hue puts words to something you already sensed." },
        { energy: "tend",  text: "When something at work or at home isn't quite right, it helps to talk it through with someone who actually knows you. That's what Hue is." },
        { energy: "flow",  text: "It's not a personality quiz. It's a conversation \u2014 one that gets more useful the more you use it." },
      ];
      const wiifimRefs = [wiifimRef0, wiifimRef1, wiifimRef2, wiifimRef3];

      return (
        <div style={{ background: C.cream }}>

          {/* Logo — top left, decorative only */}
          <div style={{ position: "absolute", top: 24, left: 24, zIndex: 10 }}>
            <SpinMark size={44} speed={10} variant="light" spread={0.32} />
          </div>

          {/* ═══ Hero (Fix 1: 88vh, scroll indicator) ═══ */}
          <section style={{
            minHeight: "88vh",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            justifyContent: "center",
            padding: "80px 24px 40px",
            textAlign: "center",
            position: "relative",
          }}>
            <div style={{ marginBottom: 48 }}>
              <SpinMark size={120} speed={6} variant="float" spread={0.32} dotScale={1} />
            </div>

            <h1 style={{
              fontFamily: "'Fraunces', serif",
              fontSize: "clamp(2.2rem, 5vw, 3.8rem)",
              fontWeight: 900,
              lineHeight: 1.15,
              color: C.ink,
              maxWidth: 700,
              marginBottom: 24,
              letterSpacing: "-0.02em",
            }}>
              Four energies. Infinite versions of you.
            </h1>

            <p style={{
              fontFamily: "'Plus Jakarta Sans', sans-serif",
              fontSize: "clamp(1rem, 2.2vw, 1.2rem)",
              fontWeight: 400,
              lineHeight: 1.65,
              color: C.stone,
              maxWidth: 560,
              marginBottom: 48,
            }}>
              A conversation that figures out how you naturally show up — then a companion who helps you use that, every single day.
            </p>

            <a href="/register" style={ctaStyle}
              onMouseEnter={(e) => e.currentTarget.style.opacity = "0.9"}
              onMouseLeave={(e) => e.currentTarget.style.opacity = "1"}
            >
              Start exploring — it's free for 14 days
            </a>

            {/* Scroll indicator */}
            <div style={{
              position: "absolute",
              bottom: 28,
              left: "50%",
              transform: "translateX(-50%)",
              opacity: scrolledPastHero ? 0 : 0.6,
              transition: "opacity 0.4s ease",
              pointerEvents: "none",
            }}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={C.stone}
                strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                style={{ animation: reducedMotion ? "none" : "scrollBounce 1.5s ease-in-out infinite" }}>
                <path d="M6 9l6 6 6-6" />
              </svg>
            </div>
          </section>

          {/* Manifesto signpost — one-sentence pointer to /manifesto */}
          <div style={{
            textAlign: "center",
            padding: "24px 24px",
            fontFamily: "'Fraunces', serif",
            fontStyle: "italic",
            fontSize: 18,
            lineHeight: 1.5,
            color: "#73685A",
          }}>
            Want the fuller argument for why we built MyHue this way? Read the{" "}
            <a href="/manifesto" style={{
              color: C.ink,
              fontWeight: 600,
              textDecoration: "underline",
              textUnderlineOffset: 3,
            }}>
              founding statement
            </a>.
          </div>

          {/* ═══ WIIFM section (Fix 2) — dark background ═══ */}
          <section style={{
            background: C.ink,
            padding: "clamp(72px, 9vw, 100px) 24px",
          }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              {wiifimStatements.map((item, i) => (
                <div
                  key={item.energy}
                  ref={wiifimRefs[i]}
                  className="reveal"
                  style={{
                    display: "flex",
                    alignItems: "flex-start",
                    gap: 24,
                    marginBottom: i < 3 ? 48 : 0,
                  }}
                >
                  <div style={{ flexShrink: 0, paddingTop: 2 }}>
                    <EnergyIcon energy={item.energy} size={48} />
                  </div>
                  <p style={{
                    fontFamily: "'Plus Jakarta Sans', sans-serif",
                    fontSize: "clamp(1.05rem, 2.2vw, 1.25rem)",
                    fontWeight: 500,
                    lineHeight: 1.65,
                    color: C.cream,
                  }}>
                    {item.text}
                  </p>
                </div>
              ))}
            </div>
          </section>

          {/* ═══ Companion section (Fix 3: animated chat) ═══ */}
          <section style={{
            background: "#F5F0E8",
            padding: "clamp(80px, 10vw, 120px) 24px",
          }}>
            <div style={{ maxWidth: 600, margin: "0 auto" }}>
              <div style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif",
                fontSize: 11,
                fontWeight: 600,
                letterSpacing: "0.14em",
                textTransform: "uppercase",
                color: C.stone,
                marginBottom: 32,
                textAlign: "center",
              }}>
                your companion
              </div>

              <AnimatedChat />
            </div>
          </section>

          {/* ═══ How it works (Fix 4: scenario hooks) ═══ */}
          <section ref={howRef} className="reveal" style={{
            padding: "clamp(80px, 10vw, 120px) 24px",
          }}>
            <div style={{
              maxWidth: 960,
              margin: "0 auto",
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))",
              gap: "clamp(40px, 5vw, 64px)",
            }}>
              {/* Step 1 — Spark */}
              <div>
                <div style={{ marginBottom: 14 }}>
                  <EnergyIcon energy="spark" size={32} />
                </div>
                <h3 style={{
                  fontFamily: "'Fraunces', serif",
                  fontSize: "clamp(1.15rem, 2.2vw, 1.35rem)",
                  fontWeight: 700, lineHeight: 1.3, color: C.ink,
                  marginBottom: 10,
                }}>
                  A conversation, not a questionnaire.
                </h3>
                <p style={{
                  fontFamily: "'Plus Jakarta Sans', sans-serif",
                  fontSize: "clamp(0.85rem, 1.6vw, 0.95rem)",
                  fontStyle: "italic", lineHeight: 1.6, color: C.stone,
                  marginBottom: 12,
                }}>
                  Before a difficult conversation, a job interview, or just a week that feels harder than usual...
                </p>
                <p style={{
