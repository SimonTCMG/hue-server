<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#FDFAF4;font-family:Georgia,serif">
<table width="100%" cellpadding="0" cellspacing="0">
<tr><td align="center" style="padding:0 24px 48px">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px">

<!-- FOUR-COLOUR TOP BAR -->
<tr><td>
  <table width="100%" cellpadding="0" cellspacing="0"><tr>
    <td style="background:#D92010;height:6px;width:25%"></td>
    <td style="background:#F5D000;height:6px;width:25%"></td>
    <td style="background:#1A8C4E;height:6px;width:25%"></td>
    <td style="background:#1755B8;height:6px;width:25%"></td>
  </tr></table>
</td></tr>

<!-- HEADER: wordmark + day name -->
<tr><td style="padding:24px 0 0">
  <table width="100%" cellpadding="0" cellspacing="0"><tr>
    <td><span style="font-family:Georgia,serif;font-size:22px;font-weight:900;
      letter-spacing:-0.02em;color:#1A1410">
      h<span style="color:#D92010">u</span>e</span></td>
    <td align="right"><span style="font-family:Arial,sans-serif;font-size:11px;
      letter-spacing:0.08em;text-transform:uppercase;color:#9B8E7E">{{DAY_NAME}}</span></td>
  </tr></table>
</td></tr>

<!-- ENERGY BADGES (instinctive + second-ranked) -->
<tr><td style="padding:18px 0 0">
  <span style="display:inline-block;border-radius:99px;padding:4px 12px 4px 8px;
    background:#F9F3E0;font-family:Arial,sans-serif;font-size:11px;font-weight:700;
    letter-spacing:0.06em;text-transform:uppercase;color:{{ENERGY_BADGE_TEXT}}">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
      background:{{ENERGY_COLOR}};vertical-align:middle;margin-right:5px"></span>
    {{ENERGY_NAME}} energy</span>
  &nbsp;
  <span style="display:inline-block;border-radius:99px;padding:4px 12px 4px 8px;
    background:#F0F7F2;font-family:Arial,sans-serif;font-size:11px;font-weight:700;
    letter-spacing:0.06em;text-transform:uppercase;color:{{SECOND_ENERGY_BADGE_TEXT}}">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;
      background:{{SECOND_ENERGY_COLOR}};vertical-align:middle;margin-right:5px"></span>
    {{SECOND_ENERGY_NAME}} energy</span>
</td></tr>

<!-- CONTENT TYPE LABEL -->
<tr><td style="padding:18px 0 0;font-family:Arial,sans-serif;font-size:11px;
  letter-spacing:0.10em;text-transform:uppercase;color:#9B8E7E">{{CONTENT_TYPE}}</td></tr>

<!-- MAIN COPY -->
<tr><td style="padding:12px 0 0">{{CONTENT_TEXT_FORMATTED}}</td></tr>

<!-- FOUR-COLOUR ACCENT RULE -->
<tr><td style="padding:20px 0 0">
  <table width="100%" cellpadding="0" cellspacing="0"><tr>
    <td style="background:#D92010;height:2px;width:25%"></td>
    <td style="background:#F5D000;height:2px;width:25%"></td>
    <td style="background:#1A8C4E;height:2px;width:25%"></td>
    <td style="background:#1755B8;height:2px;width:25%"></td>
  </tr></table>
</td></tr>

<!-- CTA BUTTON -->
<tr><td style="padding:24px 0 0">
  <a href="{{CTA_URL}}" style="display:inline-block;background:#1A1410;
    color:#FDFAF4;border-radius:99px;padding:12px 28px;font-family:Arial,sans-serif;
    font-weight:700;font-size:13px;text-decoration:none">Continue in Hue</a>
</td></tr>

<!-- FOOTER -->
<tr><td style="padding:32px 0 0;border-top:1px solid #EAE4DB">
  <table width="100%"><tr>
    <td style="font-family:Arial,sans-serif;font-size:11px;color:#9B8E7E">
      Hue &middot; <a href="https://myhue.co" style="color:#9B8E7E">myhue.co</a></td>
    <td align="right" style="font-family:Arial,sans-serif;font-size:11px;color:#9B8E7E">
      <a href="{{UNSUBSCRIBE_URL}}" style="color:#9B8E7E">Unsubscribe</a></td>
  </tr><tr>
    <td colspan="2" style="padding-top:4px;font-family:Arial,sans-serif;
      font-size:11px;color:#9B8E7E">Your profile belongs to you.</td>
  </tr></table>
</td></tr>

</table></td></tr></table>
</body></html>
